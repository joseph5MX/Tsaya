  sentences: {
    setswana: [
      `<div class="lang-tag">Setswana · Sentences 1 — Greetings</div>Mafoko a go dumedisa — real greetings from the Setswana guide! 📄<br><br>Each line: Setswana → English → key words:<br><br>👋 <b>"Dumela, rra."</b> = <i>Hello, sir.</i> <small style="color:#7A6652">rra = sir / Mr.</small><br>👋 <b>"Dumela, mma."</b> = <i>Hello, ma'am.</i> <small style="color:#7A6652">mma = ma'am / Mrs.</small><br>👋 <b>"Dumelang, borra."</b> = <i>Hello everyone (men).</i> <small style="color:#7A6652">borra = gentlemen / group of men</small><br>❓ <b>"O tsogile jang?"</b> = <i>How are you? (morning)</i> <small style="color:#7A6652">tsogile = woke up · jang = how</small><br>✅ <b>"Ke tsogile sentle."</b> = <i>I am fine / I woke up well.</i><br><br>These are real phrases from a published Setswana teaching guide. Say them all!`,
      `<div class="lang-tag">Setswana · Sentences 2 — Who you are</div>Sentences about yourself — from the PDF guide! 📄<br><br>🏷️ <b>"Leina la me ke ___."</b> = <i>My name is ___.</i><br><small style="color:#7A6652">Leina = name · la me = my · ke = is</small><br><br>❓ <b>"Leina la gago ke mang?"</b> = <i>What is your name?</i><br><small style="color:#7A6652">la gago = your · mang = who</small><br><br>🌍 <b>"Ke nna wa Botswana."</b> = <i>I am from Botswana.</i><br><small style="color:#7A6652">Ke nna = it is me · wa = of</small><br><br>Practice: say <b>"Leina la me ke ___"</b> and fill in YOUR name. This is the most important sentence!`,
      `<div class="lang-tag">Setswana · Sentences 3 — Wanting & Learning</div>Sentences from Cycle 16 of the Setswana guide! 📄<br><br>🗣️ <b>"Ke batla go bua Setswana."</b> = <i>I want to speak Setswana.</i><br><small style="color:#7A6652">ke batla = I want · go bua = to speak</small><br><br>📖 <b>"Ke batla go bala Setswana."</b> = <i>I want to read Setswana.</i><br><small style="color:#7A6652">go bala = to read</small><br><br>✍️ <b>"Ke batla go kwala Setswana."</b> = <i>I want to write Setswana.</i><br><small style="color:#7A6652">go kwala = to write</small><br><br>🎓 <b>"Re batla go bua."</b> = <i>We want to speak.</i><br><small style="color:#7A6652">Re = we</small><br><br>Which sentence best describes YOU right now?`,
      `<div class="lang-tag">Setswana · Sentences 4 — Daily actions</div>Sentences for every day! 📄<br><br>🏫 <b>"Ke ya sekolong."</b> = <i>I am going to school.</i><br><small style="color:#7A6652">ke ya = I am going · sekolong = to school (sekolo = school)</small><br><br>🍽️ <b>"Ke a ja."</b> = <i>I am eating.</i><br><small style="color:#7A6652">ke a ja = I am eating right now (a = currently doing)</small><br><br>📖 <b>"Ke a bala."</b> = <i>I am reading.</i><br><small style="color:#7A6652">ke a bala = I am reading (you are doing this now!)</small><br><br>🎵 <b>"Re a nwa."</b> = <i>We are drinking.</i><br><small style="color:#7A6652">Re = we · a nwa = drinking</small><br><br>Say: <b>"Ke a bala"</b> — because you ARE reading right now! 📖`,
      `<div class="lang-tag">Setswana · Sentences 5 — Knowing & Not Knowing</div>Honest Setswana sentences! 📄<br><br>✅ <b>"Ke itse Setswana."</b> = <i>I know Setswana.</i><br><small style="color:#7A6652">ke itse = I know</small><br><br>❌ <b>"Ga ke itse Setswana sentle."</b> = <i>I don't know Setswana well.</i><br><small style="color:#7A6652">ga ke = I don't · sentle = well</small><br><br>🗣️ <b>"Ke bua Setswana."</b> = <i>I speak Setswana.</i><br><br>❌ <b>"Ga ke bue Setswana sentle."</b> = <i>I don't speak Setswana well yet.</i><br><small style="color:#7A6652">That is okay! Every learner starts somewhere. Tswelela = Keep going!</small><br><br>Which sentence is true for you today?`,
      `<div class="lang-tag">Setswana · Sentences 6 — Goodbyes & Wisdom</div>Beautiful Setswana farewells! 📄<br><br>🚶 <b>"Tsamaya sentle."</b> = <i>Go well.</i> (said to one who is leaving)<br><small style="color:#7A6652">tsamaya = go/travel · sentle = well</small><br><br>🏠 <b>"Sala sentle."</b> = <i>Stay well.</i> (said to one who is staying)<br><small style="color:#7A6652">sala = stay/remain · sentle = well</small><br><br>😴 <b>"Robala sentle."</b> = <i>Sleep well.</i><br><small style="color:#7A6652">robala = sleep · sentle = well</small><br><br>💧 <b>"Pula!"</b> = <i>Rain! / Cheers! / Blessings!</i><br><small style="color:#7A6652">The national motto — shouted at celebrations!</small><br><br>End every day with: <b>"Robala sentle"</b> and every goodbye with <b>"Tsamaya sentle"</b>! 🇧🇼`
    ],
    kalanga: [
      `<div class="lang-tag">TjiKalanga · Sentences 1 — Greetings</div>Let's learn real TjiKalanga greetings! 📄<br><br>Each line shows: TjiKalanga → English → key word explained:<br><br>👋 <b>"Dumilani."</b> = <i>Hello / Good morning.</i><br><small style="color:#7A6652">dumilani = greet (used for one or more people)</small><br><br>❓ <b>"Mamuka tjini?"</b> = <i>How are you?</i><br><small style="color:#7A6652">mamuka = you woke up, tjini = how/what</small><br><br>✅ <b>"Tamuka totibathu."</b> = <i>I am fine, thank you.</i><br><small style="color:#7A6652">tamuka = I woke up well, totibathu = we are fine</small><br><br>Try reading the greeting out loud: <b>"Dumilani. Mamuka tjini?"</b>`,
      `<div class="lang-tag">TjiKalanga · Sentences 2 — Who you are</div>Sentences about yourself! 📄<br><br>👤 <b>"Zina rangu ndi ___."</b> = <i>My name is ___.</i><br><small style="color:#7A6652">zina = name · rangu = my · ndi = is</small><br><br>🌍 <b>"Ndodwa kuBotswana."</b> = <i>I come from Botswana.</i><br><small style="color:#7A6652">ndodwa = I come · ku = from</small><br><br>👁️ <b>"Ndi ingwi ani?"</b> = <i>Who are you?</i><br><small style="color:#7A6652">ndi = it is · ingwi = you · ani = who</small><br><br>Practice: say your name using <b>"Zina rangu ndi ___"</b> right now!`,
      `<div class="lang-tag">TjiKalanga · Sentences 3 — Everyday actions</div>Sentences for daily life! 📄<br><br>🏫 <b>"Ndinoenda kwele."</b> = <i>I am going to school.</i><br><small style="color:#7A6652">ndinoenda = I am going · kwele = school</small><br><br>💧 <b>"Ndinoda vula."</b> = <i>I want / need water.</i><br><small style="color:#7A6652">ndinoda = I want · vula = water/rain</small><br><br>🍽️ <b>"Ndinoda kudya."</b> = <i>I want food.</i><br><small style="color:#7A6652">kudya = food / to eat</small><br><br>Which of these sentences would be most useful to you today?`,
      `<div class="lang-tag">TjiKalanga · Sentences 4 — Feelings &amp; thanks</div>Sentences about feelings! 📄<br><br>🙏 <b>"Ndaboka."</b> = <i>Thank you.</i><br><small style="color:#7A6652">(nda-BOH-ka) — one of the most important TjiKalanga words!</small><br><br>😊 <b>"Ndoshatha kushangana na'ngwi."</b> = <i>It was nice meeting you.</i><br><small style="color:#7A6652">ndoshatha = I was happy · kushangana = to meet · na'ngwi = with you</small><br><br>😔 <b>"Anditoziba TjiKalanga zwibuyanana."</b> = <i>I do not know TjiKalanga well yet.</i><br><small style="color:#7A6652">anditoziba = I do not know · zwibuyanana = very well</small><br><br>That last sentence is honest and brave — say it proudly as you keep learning!`,
      `<div class="lang-tag">TjiKalanga · Sentences 5 — People &amp; things</div>Sentences about people and objects! 📄<br><br>👶 <b>"Bana ba gala."</b> = <i>The children are sitting / staying.</i><br><small style="color:#7A6652">bana = children · ba = they · gala = to sit/live</small><br><br>🔥 <b>"Moto ufuma."</b> = <i>The fire is hot / rich.</i><br><small style="color:#7A6652">moto = fire · ufuma = it is rich/hot (fuma = to be rich)</small><br><br>🐟 <b>"Hobe iri munoka."</b> = <i>The fish is in the river.</i><br><small style="color:#7A6652">hobe = fish · munoka = in the river (noka = river in Setswana, same root)</small><br><br>Read each sentence slowly and picture it in your mind!`,
      `<div class="lang-tag">TjiKalanga · Sentences 6 — Asking &amp; replying</div>Useful question sentences! 📄<br><br>❓ <b>"Kuthu ikoku kodana bungana?"</b> = <i>How much does this thing cost?</i><br><small style="color:#7A6652">kuthu = thing · ikoku = this · kodana = how much · bungana = amount</small><br><br>📍 <b>"Unoyenda kupi?"</b> = <i>Where are you going?</i><br><small style="color:#7A6652">unoyenda = you are going · kupi = where</small><br><br>✅ <b>"Ee."</b> = <i>Yes.</i> &nbsp;&nbsp; ❌ <b>"Aa."</b> = <i>No.</i><br><small style="color:#7A6652">ee = yes (agreement) · aa = no (denial/refusal)</small><br><br>These three sentences will help you in any shop or market in Botswana! 🛒`
    ],
    kgalagadi: [
      `<div class="lang-tag">Shekgalagari · Sentences 1 — Greetings</div>Real Shekgalagari greetings! 📄<br><br>Shekgalagari sentence → English → key words:<br><br>👋 <b>"Dumela."</b> = <i>Hello.</i><br><small style="color:#7A6652">Same as Setswana! Very close languages</small><br><br>👋 <b>"Dumela, rra."</b> = <i>Hello, sir.</i><br><small style="color:#7A6652">rra = sir / Mr. (used for men)</small><br><br>👋 <b>"Dumela, mma."</b> = <i>Hello, ma'am.</i><br><small style="color:#7A6652">mma = ma'am / Mrs. (used for women)</small><br><br>Try saying: <b>"Dumela, rra!"</b> or <b>"Dumela, mma!"</b><br>Use the right one depending on who you are greeting!`,
      `<div class="lang-tag">Shekgalagari · Sentences 2 — Who you are</div>Sentences about yourself! 📄<br><br>🏷️ <b>"Leina la me ke ___."</b> = <i>My name is ___.</i><br><small style="color:#7A6652">Leina = name · la me = my · ke = is</small><br><br>❓ <b>"Leina la gago ke mang?"</b> = <i>What is your name?</i><br><small style="color:#7A6652">la gago = your · mang = who/what</small><br><br>🌍 <b>"Ke nna wa Botswana."</b> = <i>I am from Botswana.</i><br><small style="color:#7A6652">Ke nna = it is me · wa = of / from</small><br><br>Practice: say <b>"Leina la me ke ___"</b> and fill in YOUR name right now!`,
      `<div class="lang-tag">Shekgalagari · Sentences 3 — Commands</div>Shekgalagari command sentences! 📄<br><br>These are real classroom commands used in Shekgalagari:<br><br>⬇️ <b>"Tla!"</b> / <b>"Nto!"</b> = <i>Come!</i><br><small style="color:#7A6652">Both mean come — nto is the Shekgalagari form</small><br><br>🪑 <b>"Rula!"</b> = <i>Sit down!</i><br><small style="color:#7A6652">(ROO-la) — "Nna!" in Setswana</small><br><br>🧍 <b>"Metshe!"</b> = <i>Stand up!</i><br><small style="color:#7A6652">(MET-sheh) — "Ema!" in Setswana</small><br><br>👂 <b>"Uzwa!"</b> = <i>Listen!</i><br><small style="color:#7A6652">(OO-zwa) — "Utlwa!" in Setswana</small><br><br>These 4 commands are used in schools every day. Try saying them all!`,
      `<div class="lang-tag">Shekgalagari · Sentences 4 — Asking for help</div>Important sentences for real life! 📄<br><br>🆘 <b>"Ntjhusa!"</b> = <i>Help me!</i><br><small style="color:#7A6652">(nn-TCHOO-sa) — "Nthusa!" in Setswana</small><br><br>❓ <b>"Hakeze."</b> = <i>I don't know.</i><br><small style="color:#7A6652">(hah-KEH-zeh) — "Ga ke itse" in Setswana. Honest and useful!</small><br><br>🍳 <b>"Ke relaa."</b> = <i>I am cooking.</i><br><small style="color:#7A6652">relaa = to cook — "ke apaya" in Setswana</small><br><br>😴 <b>"Daleja nda ka lapa."</b> = <i>I am tired.</i><br><small style="color:#7A6652">(dah-LEH-ja nda ka LAH-pa) — "Ke lapile" in Setswana</small><br><br>Which of these sentences would be most useful to you today?`,
      `<div class="lang-tag">Shekgalagari · Sentences 5 — Daily life</div>Sentences for everyday Shekgalagari! 📄<br><br>🥛 <b>"Ke batla moriso."</b> = <i>I want milk.</i><br><small style="color:#7A6652">ke batla = I want · moriso = milk (mashi in Setswana)</small><br><br>💧 <b>"Ke batla maze."</b> = <i>I want water.</i><br><small style="color:#7A6652">maze = water (metsi in Setswana)</small><br><br>🏫 <b>"Ke ya shekoleng."</b> = <i>I am going to school.</i><br><small style="color:#7A6652">ke ya = I am going · shekoleng = to school (shekole = school)</small><br><br>🗣️ <b>"Ke bola Shekgalagari."</b> = <i>I speak Shekgalagari.</i><br><small style="color:#7A6652">ke bola = I speak · Shekgalagari = the language name</small><br><br>Say the last sentence proudly: <b>"Ke bola Shekgalagari!"</b> 🌟`,
      `<div class="lang-tag">Shekgalagari · Sentences 6 — Wisdom</div>Shekgalagari wisdom! 📄<br><br>💧 <b>"Maze ke botshelo."</b> = <i>Water is life.</i><br><small style="color:#7A6652">maze = water · ke = is · botshelo = life</small><br><br>🙏 <b>"Ntjhusa go ithuta."</b> = <i>Help me to learn.</i><br><small style="color:#7A6652">ntjhusa = help me · go ithuta = to learn</small><br><br>🌍 <b>"Re bua Shekgalagari."</b> = <i>We speak Shekgalagari.</i><br><small style="color:#7A6652">Re = we · bua = speak (Setswana word, shared!)</small><br><br>The Kgalagadi language is spoken across the Kalahari desert — one of the world's oldest landscapes. Speaking it connects you to thousands of years of history. 🏜️`
    ],
    mbukushu: [
      `<div class="lang-tag">Thimbukushu · Sentences 1 — Who you are</div>Real Thimbukushu sentences! 📄<br><br>Each line: Thimbukushu → English → key words explained:<br><br>👤 <b>"Ame kughamba Thimbukushu."</b><br>= <i>I speak Thimbukushu.</i><br><small style="color:#7A6652">Ame = I · kughamba = to speak · Thimbukushu = the language name</small><br><br>🏷️ <b>"Dina dyange ne yame ___."</b><br>= <i>My name is ___.</i><br><small style="color:#7A6652">Dina dyange = my name · ne yame = is (it is me)</small><br><br>Try it! Say: <b>"Dina dyange ne yame ___"</b> — fill in YOUR name!`,
      `<div class="lang-tag">Thimbukushu · Sentences 2 — Wanting & Knowing</div>More real Thimbukushu sentences! 📄<br><br>💡 <b>"Owe wa dimuka kughamba Thimbukushu."</b><br>= <i>You know how to speak Thimbukushu.</i><br><small style="color:#7A6652">Owe = you · wa dimuka = you know · kughamba = to speak</small><br><br>🙏 <b>"Na shana kudimuka kughamba ndimi dho Thimbukushu."</b><br>= <i>I want to know how to speak the Thimbukushu language.</i><br><small style="color:#7A6652">Na shana = I want · kudimuka = to know · ndimi = language</small><br><br>Read the second sentence slowly. You are living it right now — you WANT to learn! 🌟`,
      `<div class="lang-tag">Thimbukushu · Sentences 3 — Daily life</div>Sentences for every day! 📄<br><br>📖 <b>"Ame na haka kutoya."</b><br>= <i>I like reading.</i><br><small style="color:#7A6652">Ame = I · na haka = I like · kutoya = reading</small><br><br>🚶 <b>"Ame kuna kuyenda."</b><br>= <i>I am walking.</i><br><small style="color:#7A6652">kuna = currently/am · kuyenda = to walk</small><br><br>🏠 <b>"Wiye kudimbo."</b><br>= <i>Come home.</i><br><small style="color:#7A6652">Wiye = come · kudimbo = home/to the home</small><br><br>Which sentence would you use most today?`,
      `<div class="lang-tag">Thimbukushu · Sentences 4 — Teaching & Feelings</div>Deeper Thimbukushu sentences! 📄<br><br>👩‍🏫 <b>"Aye kuna kuhonga."</b><br>= <i>He / she is teaching.</i><br><small style="color:#7A6652">Aye = he/she · kuna = is (currently) · kuhonga = to teach</small><br><br>🤝 <b>"Dina dya mushere wange ne Ella."</b><br>= <i>My friend's name is Ella.</i><br><small style="color:#7A6652">Dina dya = the name of · mushere wange = my friend · ne = is</small><br><br>☮️ <b>"Thiraro ne tha reta makukwatathano."</b><br>= <i>Peace brings collaboration.</i><br><small style="color:#7A6652">Thiraro = peace · tha reta = it brings · makukwatathano = collaboration</small><br><br>A beautiful saying! Peace brings people together. 🌍`,
      `<div class="lang-tag">Thimbukushu · Sentences 5 — Today & Time</div>Time sentences in Thimbukushu! 📄<br><br>📅 <b>"Dyaro ne mepo."</b><br>= <i>Today it is cold.</i><br><small style="color:#7A6652">Dyaro = today · ne = it is · mepo = cold</small><br><br>🏫 <b>"Kuna kukara maranga kushure."</b><br>= <i>Running late to school.</i><br><small style="color:#7A6652">Kuna kukara = is being · maranga = late · kushure = to school</small><br><br>🦟 <b>"Kamwe ka ni humu."</b><br>= <i>I have been bitten by a mosquito.</i><br><small style="color:#7A6652">Kamwe = mosquito · ka ni humu = it bit me</small><br><br>Read slowly and picture each scene. Which sentence made you smile?`,
      `<div class="lang-tag">Thimbukushu · Sentences 6 — Proverbs & Wisdom</div>Beautiful Thimbukushu wisdom! 📄<br><br>😴 <b>"Mbadi kukaranga ghuva."</b><br>= <i>Don't be lazy.</i><br><small style="color:#7A6652">Mbadi = don't · kukaranga = be/become · ghuva = lazy</small><br><br>👥 <b>"Hanu hahaka mandimi."</b><br>= <i>People like languages.</i><br><small style="color:#7A6652">Hanu = people · hahaka = they like · mandimi = languages</small><br><br>☀️ <b>"Kutumunekara thishe."</b><br>= <i>The sun brightens the day.</i><br><small style="color:#7A6652">Kutumunekara = it brightens · thishe = the day / the light</small><br><br>You are like the sun — <b>Kutumunekara thishe</b> — brightening your future by learning today! 🌟`
    ],
    english: [
      `<div class="lang-tag">English · Sentences</div>Let's read sentences! 📄<br><br>Try to read these:<br><b>"My name is ___."</b><br><b>"I live in Botswana."</b><br><b>"I want to learn."</b><br><b>"Water is life."</b><br><br>Read slowly… Well done! 🌟<br>Which sentence is easiest for you?`,
      `<div class="lang-tag">English · Sentences</div>Excellent! 🎉 More practice:<br><br><b>"I go to the shop."</b><br><b>"The bus is here."</b><br><b>"I drink water every day."</b><br><b>"My children go to school."</b><br><br>Try to say one sentence about your day!`
    ]
  },

  // ─── DAILY LIFE ───
  daily: {
    setswana: [
      `<div class="lang-tag">Setswana · Daily Life — Places</div>Mafelo a a botlhokwa — important places! 🏠<br><br>🏬 <b>Lebenkele</b> = <b>shop / store</b> <small style="color:#7A6652">(leh-BEN-keh-leh)</small><br>🚌 <b>Bese</b> = <b>bus</b> <small style="color:#7A6652">(BEH-seh)</small><br>🏥 <b>Sepetlele</b> = <b>hospital</b> <small style="color:#7A6652">(seh-peh-TLEh-leh)</small><br>🏫 <b>Sekolo</b> = <b>school</b> <small style="color:#7A6652">(seh-KOH-lo)</small><br>🏦 <b>Banka</b> = <b>bank</b> <small style="color:#7A6652">(BAN-ka — sounds like English!)</small><br><br>O ya kwa letsatsi le letsatsi? (Where do you go every day?)`,
      `<div class="lang-tag">Setswana · Daily Life — Work & Documents</div>Tirelo le ditatamente! 💼<br><br>💼 <b>Tirelo</b> = <b>work / service</b> <small style="color:#7A6652">(tee-REH-lo) — "Ke bereka" = I work</small><br>📄 <b>Pampiri</b> = <b>paper / document</b> <small style="color:#7A6652">(pam-PEE-ree)</small><br>✍️ <b>Saina</b> = <b>to sign</b> <small style="color:#7A6652">(SAH-ee-na — from English)</small><br>🧾 <b>Risiti</b> = <b>receipt</b> <small style="color:#7A6652">(ree-SEE-tee)</small><br>📞 <b>Mogala</b> = <b>telephone</b> <small style="color:#7A6652">(mo-GAH-la) — traditional word</small><br><br>Next time you sign a document, say: <b>"Ke saina"</b> = I am signing! ✍️`,
      `<div class="lang-tag">Setswana · Daily Life — Home & Food</div>Ntlo le dijo! 🏡<br><br>🏠 <b>Ntlo</b> = <b>house</b> <small style="color:#7A6652">(nn-TLO)</small><br>🍲 <b>Bogobe</b> = <b>porridge (thick)</b> <small style="color:#7A6652">(bo-GOH-beh) — traditional food of Botswana</small><br>💧 <b>Metsi</b> = <b>water</b> <small style="color:#7A6652">(MET-see)</small><br>🥛 <b>Mashi</b> = <b>milk</b> <small style="color:#7A6652">(MAH-shee)</small><br>🍽️ <b>Dijana</b> = <b>dishes / plates</b> <small style="color:#7A6652">(dee-JAH-na) — "Ke ahatswa dijana" = I am washing dishes</small><br><br>Bogobe ke dijo tsa setshaba sa Botswana — porridge is the national food! Do you eat it?`,
      `<div class="lang-tag">Setswana · Daily Life — Time & Weather</div>Nako le boemo ba layetse! ⏰<br><br>☀️ <b>Letsatsi</b> = <b>sun / day</b> <small style="color:#7A6652">(leh-TSAT-see)</small><br>🌙 <b>Bosigo</b> = <b>night</b> <small style="color:#7A6652">(bo-SEE-go)</small><br>🌅 <b>Mosong</b> = <b>morning</b> <small style="color:#7A6652">(mo-SONG)</small><br>❄️ <b>Tsididi</b> = <b>cold</b> <small style="color:#7A6652">(tsee-DEE-dee) — "Go tsididi thata" = It is very cold</small><br>🌧️ <b>Pula</b> = <b>rain</b> <small style="color:#7A6652">(POO-la) — also means money and blessings!</small><br><br>Mo Botswana, go bua "Pula!" ke go bua "Blessings!" — Rain is a precious gift here! 🌧️`
    ],
    kalanga: [
      `<div class="lang-tag">TjiKalanga · Daily Life — Places</div>TjiKalanga words for places you visit! 🏠<br><br>🏫 <b>Kwele</b> = <b>school</b> <small style="color:#7A6652">(KWEH-leh)</small><br>🏦 <b>Banka</b> = <b>bank</b> <small style="color:#7A6652">(BAN-ka — sounds like English!)</small><br>🏨 <b>Hotela</b> = <b>hotel</b> <small style="color:#7A6652">(ho-TEH-la — sounds like English!)</small><br>⛪ <b>Tshipi</b> = <b>church / Sunday</b> <small style="color:#7A6652">(TSHEE-pee)</small><br>🏥 <b>I patela</b> = <b>hospital</b> <small style="color:#7A6652">(ee pa-TEH-la)</small><br>🛒 <b>Tengo</b> = <b>purchase / shopping</b> <small style="color:#7A6652">(TEN-go)</small><br><br>Which of these places did you visit this week?`,
      `<div class="lang-tag">TjiKalanga · Daily Life — Transport &amp; Documents</div>Getting around in TjiKalanga! 🚗<br><br>🚗 <b>Koloyi</b> = <b>vehicle / wagon</b> <small style="color:#7A6652">(ko-LOY-ee)</small><br>🚂 <b>Tirina</b> = <b>train</b> <small style="color:#7A6652">(tee-REE-na)</small><br>📄 <b>Pampiri</b> = <b>paper / document</b> <small style="color:#7A6652">(pam-PEE-ree)</small><br>🧾 <b>Resiti</b> = <b>receipt</b> <small style="color:#7A6652">(reh-SEE-tee)</small><br>📞 <b>Founi</b> = <b>telephone</b> <small style="color:#7A6652">(FOH-nee)</small><br>✍️ <b>Saina</b> = <b>to sign</b> <small style="color:#7A6652">(SAH-ee-na — from English "sign"!)</small><br><br>Next time you sign a document, remember: in TjiKalanga that is called <b>Saina</b>!`,
      `<div class="lang-tag">TjiKalanga · Daily Life — Home &amp; Kitchen</div>TjiKalanga words for your home! 🏡<br><br>🏠 <b>Ng'umba</b> = <b>house / hut</b> <small style="color:#7A6652">(ng-OOM-ba)</small><br>🍽️ <b>Ndilo</b> = <b>dish / plate</b> <small style="color:#7A6652">(nn-DEE-lo)</small><br>🫕 <b>Hali</b> = <b>cooking pot</b> <small style="color:#7A6652">(HAH-lee)</small><br>🧼 <b>Sipa</b> = <b>soap</b> <small style="color:#7A6652">(SEE-pa)</small><br>🍶 <b>Butili</b> = <b>bottle</b> <small style="color:#7A6652">(boo-TEE-lee)</small><br>📦 <b>Bhokisi</b> = <b>box / bag / coffin</b> <small style="color:#7A6652">(bho-KEE-see)</small><br><br>Look around your home — can you name 3 objects in TjiKalanga?`,
      `<div class="lang-tag">TjiKalanga · Daily Life — Work &amp; Money</div>TjiKalanga work and money words! 💰<br><br>💼 <b>Shingo</b> = <b>work / employment</b> <small style="color:#7A6652">(SHEEN-go)</small><br>💰 <b>Ma ri</b> = <b>money</b> <small style="color:#7A6652">(mah-REE)</small><br>🛒 <b>Tenga</b> = <b>to buy</b> <small style="color:#7A6652">(TEN-ga)</small><br>🏷️ <b>Tengesa</b> = <b>to sell</b> <small style="color:#7A6652">(ten-GEH-sa)</small><br>💳 <b>Lipa</b> = <b>to pay a debt</b> <small style="color:#7A6652">(LEE-pa)</small><br>🤲 <b>Kumbila</b> = <b>to beg / ask for / request</b> <small style="color:#7A6652">(koom-BEE-la)</small><br><br>If you go to a shop: you <b>Tenga</b> (buy) and the shopkeeper <b>Tengesa</b> (sells). Simple!`
    ],
    kgalagadi: [
      `<div class="lang-tag">Shekgalagari · Daily Life — Home</div>Shekgalagari home words! 🏠<br><br>🏠 <b>Itu</b> = <b>house</b> <small style="color:#7A6652">(EE-too) — Setswana: ntlo</small><br>🏫 <b>Shekole</b> = <b>school</b> <small style="color:#7A6652">(sheh-KOH-leh) — Setswana: sekolo</small><br>💧 <b>Maze</b> = <b>water</b> <small style="color:#7A6652">(MAH-zeh) — Setswana: metsi</small><br>🥛 <b>Moriso</b> = <b>milk</b> <small style="color:#7A6652">(mo-REE-so) — Setswana: mashi</small><br>🍳 <b>Relaa</b> = <b>to cook</b> <small style="color:#7A6652">(reh-LAH) — Setswana: apaya</small><br><br>Which of these do you use in your home every day?`,
      `<div class="lang-tag">Shekgalagari · Daily Life — People</div>Shekgalagari people words! 🏠<br><br>🧑 <b>Moqho</b> = <b>person</b> <small style="color:#7A6652">(MO-qo) — Setswana: motho</small><br>👶 <b>Motjhwana</b> = <b>child / kid</b> <small style="color:#7A6652">(mo-TCHWAH-na) — Setswana: ngwana</small><br>👦 <b>Mantjsana</b> = <b>boy</b> <small style="color:#7A6652">(man-TCHA-na) — Setswana: mosimane</small><br>👧 <b>Mosezana</b> = <b>girl</b> <small style="color:#7A6652">(mo-seh-ZAH-na) — Setswana: mosetsana</small><br>👫 <b>Kgalariyame</b> = <b>brother / sister</b> <small style="color:#7A6652">(ka-la-REE-ya-meh)</small><br><br>Point to someone near you — what is their Shekgalagari word?`,
      `<div class="lang-tag">Shekgalagari · Daily Life — Actions</div>Everyday Shekgalagari actions! 🏠<br><br>⬇️ <b>Tla / Nto</b> = <b>come!</b> <small style="color:#7A6652">(TLA / nn-TOH) — used to call someone</small><br>🪑 <b>Rula</b> = <b>sit down</b> <small style="color:#7A6652">(ROO-la)</small><br>🧍 <b>Metshe</b> = <b>stand up</b> <small style="color:#7A6652">(MET-sheh)</small><br>👂 <b>Uzwa</b> = <b>hear / listen</b> <small style="color:#7A6652">(OO-zwa)</small><br>🆘 <b>Ntjhusa</b> = <b>help me</b> <small style="color:#7A6652">(nn-TCHOO-sa)</small><br><br>These 5 words will help you communicate in any situation. Practice saying them all!`,
      `<div class="lang-tag">Shekgalagari · Daily Life — Cattle Culture</div>An important part of Shekgalagari life! 🏜️<br><br>The Kgalagadi people have a rich cattle-herding tradition. These words reflect that culture:<br><br>🐄 <b>Rimho / Rikgomo</b> = <b>cattle / cows</b> <small style="color:#7A6652">(REE-mo / ree-KGO-mo) — Setswana: dikgomo</small><br>🥛 <b>Moriso</b> = <b>milk</b> <small style="color:#7A6652">(mo-REE-so) — from the cattle</small><br>🌿 <b>Tshimo</b> = <b>field / garden</b> <small style="color:#7A6652">(TSHEE-mo) — shared with Setswana!</small><br>☀️ <b>Leatjsi</b> = <b>sun / day</b> <small style="color:#7A6652">(leh-AT-see) — the sun guides the cattle herder</small><br><br>The Kgalagadi people live in one of the driest places on earth — the Kalahari. Every drop of <b>Maze</b> (water) matters! 🌵`
    ],
    mbukushu: [
      `<div class="lang-tag">Thimbukushu · Daily Life — People & Places</div>Thimbukushu words for daily life! 🏠<br><br>👨‍👩‍👧 <b>Hanu</b> = <b>people</b> <small style="color:#7A6652">(HAH-noo) — the people around you every day</small><br>🤝 <b>Mushere</b> = <b>friend</b> <small style="color:#7A6652">(moo-SHEH-reh) — someone close to you</small><br>🏫 <b>Kushure</b> = <b>school</b> <small style="color:#7A6652">(koo-SHOO-reh) — "kuna kukara maranga kushure" = running late to school</small><br>🏠 <b>Kudimbo</b> = <b>home</b> <small style="color:#7A6652">(koo-DIM-bo) — "Wiye kudimbo" = Come home</small><br><br>Practice: say <b>"Wiye kudimbo"</b> — can you use it today to call someone home?`,
      `<div class="lang-tag">Thimbukushu · Daily Life — Time & Weather</div>Thimbukushu time and weather words! 🏠<br><br>📅 <b>Dyaro</b> = <b>today</b> <small style="color:#7A6652">(DYA-ro) — "Dyaro ne mepo" = Today it's cold</small><br>☀️ <b>Diyuwa</b> = <b>sun</b> <small style="color:#7A6652">(dee-YOO-wa) — the sun you see every morning</small><br>⏰ <b>Maranga</b> = <b>late</b> <small style="color:#7A6652">(ma-RAN-ga) — "Kuna kukara maranga" = Running late</small><br>❄️ <b>Mepo</b> = <b>cold</b> <small style="color:#7A6652">(MEH-po) — "Dyaro ne mepo" = Today it's cold</small><br><br>Is it <b>Mepo</b> (cold) or warm where you are today? Say it in Thimbukushu!`,
      `<div class="lang-tag">Thimbukushu · Daily Life — Food & Things</div>Thimbukushu everyday object words! 🏠<br><br>🍽️ <b>Yidya</b> = <b>food</b> <small style="color:#7A6652">(YEE-dya) — "Ghahaka yidya" = He/she likes food</small><br>🦟 <b>Kamwe</b> = <b>mosquito</b> <small style="color:#7A6652">(KAM-weh) — "Kamwe ka ni humu" = A mosquito bit me</small><br>👅 <b>Rudimi</b> = <b>tongue</b> <small style="color:#7A6652">(roo-DEE-mee) — used to speak your language!</small><br>📦 <b>Yiwana/Yinu</b> = <b>belongings / things</b> <small style="color:#7A6652">(yee-WAH-na) — your possessions</small><br><br>Your <b>Rudimi</b> (tongue) is your greatest tool — use it to speak Thimbukushu!`,
      `<div class="lang-tag">Thimbukushu · Daily Life — Language & Learning</div>Thimbukushu words about language itself! 🌍<br><br>📖 <b>Kutoya</b> = <b>reading</b> <small style="color:#7A6652">(koo-TOY-a) — what you are doing RIGHT NOW</small><br>🗣️ <b>Kughamba</b> = <b>to speak</b> <small style="color:#7A6652">(koo-GHAM-ba) — "Ame kughamba Thimbukushu" = I speak Thimbukushu</small><br>💡 <b>Dimuka</b> = <b>to know / understand</b> <small style="color:#7A6652">(dee-MOO-ka)</small><br>📚 <b>Mandimi</b> = <b>languages</b> <small style="color:#7A6652">(man-DEE-mee) — "Hanu hahaka mandimi" = People like languages</small><br><br>You are doing all four of these things today — reading, speaking, knowing, loving languages! 🌟`
    ],
    english: [
      `<div class="lang-tag">English · Daily Life — Places</div>English words for places you visit! 🏠<br><br>🏬 <b>Shop / Store</b> = where you buy food and goods<br><small style="color:#7A6652">You will see signs: "OPEN", "CLOSED", "PRICE", "SALE"</small><br>🚌 <b>Bus / Bus stop</b> = public transport<br><small style="color:#7A6652">You will see signs: "DEPARTURE", "ARRIVAL", "TICKET"</small><br>🏥 <b>Clinic / Hospital</b> = where doctors help you<br><small style="color:#7A6652">You will see: "RECEPTION", "QUEUE HERE", "EMERGENCY"</small><br>🏫 <b>School</b> = where learning happens<br>⛪ <b>Church</b> = place of worship<br><br>Which of these places do you visit most in your week?`,
      `<div class="lang-tag">English · Daily Life — Signs & Documents</div>English words you see on signs! 🏠<br><br>📄 <b>Form</b> = a document to fill in with your information<br>✍️ <b>Sign</b> = to write your name (signature) on a document<br>🧾 <b>Receipt</b> = paper proof that you paid<br>🧍 <b>Queue</b> = a line of people waiting their turn<br>🆔 <b>ID / Identity</b> = your identification document<br>📋 <b>Application</b> = a form you fill to apply for something<br><br>These words appear in every office, bank and clinic. Knowing them means you can handle any official situation! 💪`,
      `<div class="lang-tag">English · Daily Life — Time words</div>English time words! ⏰<br><br>☀️ <b>Morning</b> = early part of the day (6am–12pm)<br>🌤️ <b>Afternoon</b> = after midday (12pm–6pm)<br>🌙 <b>Evening / Night</b> = after dark<br>📅 <b>Today</b> = this current day<br>📅 <b>Tomorrow</b> = the next day<br>📅 <b>Yesterday</b> = the day before today<br>📅 <b>Week</b> = 7 days / <b>Month</b> = about 30 days<br><br>Practice: say what time of day it is RIGHT NOW in English! 🌟`,
      `<div class="lang-tag">English · Daily Life — Numbers in real life</div>English numbers in daily use! 🔢<br><br>In English, numbers appear everywhere:<br><br>📞 <b>Phone number</b> — you dial numbers to call<br>💰 <b>Price</b> — numbers tell you how much things cost<br>📅 <b>Date</b> — numbers tell you the day, month and year<br>🏠 <b>Address</b> — numbers tell you where a building is<br>⏰ <b>Time</b> — numbers tell you what hour it is<br><br>Example: "The price is <b>twenty-five pula</b>."<br>Can you write 25 in English words? <b>Twenty-five</b>! 🎉<br>You already know this — you learned it in the numbers lesson!`
    ]
  },

  // ─── WRITING ───
  writing: {
    setswana: [
      `<div class="lang-tag">Setswana · Writing 1 — Your Name</div>Re ithute go kwala Setswana! ✏️<br><br>Go kwala = to write. You are learning to <b>kwala</b> today!<br><br>Steps:<br>1. Kwala tlhaka nngwe le nngwe — one letter at a time<br>2. Kgaoganya mafoko — leave spaces between words<br>3. Simolola ka tlhaka e kgolo — capital letter at the start<br><br>Leka go kwala: <b>LEINA LA ME KE ___</b><br>= <i>"My name is ___"</i> — fill in YOUR name! 🌟`,
      `<div class="lang-tag">Setswana · Writing 2 — Short words</div>Sentle! 🌟 Kwala mafoko a makubu a:<br><br>✍️ <b>E - E</b> = yes ✅<br>✍️ <b>N - Y - A - A</b> = no ❌<br>✍️ <b>R - R - A</b> = sir / father 👨<br>✍️ <b>M - M - A</b> = ma'am / mother 👩<br>✍️ <b>P - U - L - A</b> = rain / money / cheers 🌧️<br><br>Kwala lefoko le le tshwanang: P-U-L-A<br>Fa o kwala PULA, o kwala lefoko la botlhokwa jo bogolo mo Botswana!`,
      `<div class="lang-tag">Setswana · Writing 3 — Medium words</div>Sentle thata! 🎉 Kwala mafoko a a manana a:<br><br>✍️ <b>N - T - L - O</b> = house 🏠 (4 letters)<br>✍️ <b>B - A - N - A</b> = children 👶 (4 letters)<br>✍️ <b>D - U - M - E - L - A</b> = hello 👋 (6 letters)<br>✍️ <b>S - E - N - T - L - E</b> = well / good 🌟 (6 letters)<br><br>Bala tlhaka nngwe le nngwe fa o e kwala: D… U… M… E… L… A = DUMELA!<br>That word alone will open every door in Botswana! 🇧🇼`,
      `<div class="lang-tag">Setswana · Writing 4 — Longer words</div>O a kgona! 🌟 Mafoko a magolo go kwala:<br><br>✍️ <b>TSAMAYA</b> = go well / travel 🚶 (7 letters: T-S-A-M-A-Y-A)<br>✍️ <b>GABORONE</b> = capital city 🏙️ (8 letters: G-A-B-O-R-O-N-E)<br>✍️ <b>LEBENKELE</b> = shop 🏬 (9 letters: L-E-B-E-N-K-E-L-E)<br>✍️ <b>BOTSWANA</b> = our country 🇧🇼 (8 letters: B-O-T-S-W-A-N-A)<br><br>Kwala lefoko le lengwe. Bala ditlhaka fa o di kwala.<br>BOTSWANA — o kwala leina la naga ya gago! 🌍`
    ],
    kalanga: [

// ═══════════════════════════════════════════
// SMART RESPONSE ENGINE
// ═══════════════════════════════════════════
const lessonCounters = {};

function getTutorResponse(input) {
  const L = LANGS[currentLang];
  const txt = input.toLowerCase();

  // Greeting / name response
  if (txt.match(/^(hi|hello|dumela|salibonani|mbukuuru|hey|yo)\b/) ||
      txt.match(/(my name is|ke nna|leina la me|zita rangu|ndinonzi)/i)) {
    const name = input.replace(/my name is|ke nna|leina la me ke|zita rangu ndi|ndinonzi/gi,'').trim();
    if (name.length > 1) {
      return `${L.good} 😊 ${name.charAt(0).toUpperCase()+name.slice(1)}, o amogetswe! Welcome!<br><br>Ke itumetse go go ithuta — I am happy to learn with you. 🌟<br><br>Kgetha topic e o batlang go simolola ka yona. Pick a topic from the buttons above — letters, numbers, or words!`;
    }
    return `${L.good} 😊 O amogetswe! Welcome!<br><br>Ke itumetse go go ithuta. I am happy to learn with you. 🌟<br><br>Leina la gago ke mang? What is your name?`;
  }

  // Alphabet / letters
  if (txt.match(/alpha|letter|tlhaka|tsamba|abc|alfabet|huruf/)) {
    return getLesson('alphabet');
  }

  // Numbers
  if (txt.match(/number|namba|nhamba|count|bala|verenga|nomoro|digit|1|2|3|ten|lesome|gumi|likumi/)) {
    return getLesson('numbers');
  }

  // Name writing
  if (txt.match(/name|leina|zita|jina|ngwala.*leina|nyora.*zita|write.*name/)) {
    return getLesson('name');
  }

  // Sentences
  if (txt.match(/sentence|mafoko|mitsara|paragraph|read|bala|verenga|kuverenga/)) {
    return getLesson('sentences');
  }

  // Daily life
  if (txt.match(/daily|shop|bus|hospital|lebenkele|bese|sepetlele|chipatara|sitolo|work|basa/)) {
    return getLesson('daily');
  }

  // Writing
  if (txt.match(/writ|kwala|nyora|ngwala|pen|pencil|pratise|practice/)) {
    return getLesson('writing');
  }

  // Words
  if (txt.match(/word|mafoko|mazwi|vocab|meaning|bolela|kutaura/)) {
    return getLesson('words');
  }

  // Thank you
  if (txt.match(/thank|ke a lebog|ndaboka|nda livhuwa|tanki|siyabonga/)) {
    return `${L.good} 😊 Thank you too!<br><br>You are doing great work! 💪<br>In TjiKalanga, "thank you" is <b>Ndaboka</b> <small style="color:#b5a898">(nda-BOH-ka)</small><br><br>Shall we continue learning?`;
  }

  // Good / yes
  if (txt.match(/^(yes|ya|yep|ok|okay|sure|correct|right|good|sentle|zwavhudi|nawa|sentile|eya|ee)\b/)) {
    return `${L.great} 🎉<br><br>${L.keep} Let us keep going!<br><br>Pick a topic above to continue — or just tell me what you want to learn next!`;
  }

  // Help
  if (txt.match(/help|thusa|batsela|ndibatsire/)) {
    return `Ke tla go thusa — I will help you! 😊<br><br>Here is what we can learn together:<br>🔤 <b>Letters</b> — the alphabet<br>🔢 <b>Numbers</b> — counting 1–10<br>💬 <b>Words</b> — important words<br>📄 <b>Sentences</b> — reading phrases<br>🏠 <b>Daily Life</b> — words you use every day<br>✏️ <b>Writing</b> — how to write<br><br>Which one do you want to start with?`;
  }

  // Topic: letters/alphabet (pill click)
  if (txt.includes('letters') || txt.includes('sounds')) return getLesson('alphabet');
  if (txt.includes('words') && !txt.includes('everyday')) return getLesson('words');
  if (txt.includes('sentence')) return getLesson('sentences');
  if (txt.includes('numbers') || txt.includes('counting')) return getLesson('numbers');
  if (txt.includes('daily') || txt.includes('everyday life')) return getLesson('daily');
  if (txt.includes('writing') || txt.includes('practice')) return getLesson('writing');

  // Default encouragement with topic menu
  return `${L.good} 😊<br><br>Ke utlwa — I hear you. Let us keep learning together! 🌟<br><br>What would you like to do next?<br>🔤 <b>Letters</b> &nbsp;|&nbsp; 🔢 <b>Numbers</b> &nbsp;|&nbsp; 💬 <b>Words</b> &nbsp;|&nbsp; ✏️ <b>Writing</b><br><br>Just press a button above or type what you want to learn!`;
}

function getLesson(topic) {
  const key = currentLang + '_' + topic;
  const pool = (LESSONS[topic] || {})[currentLang] || LESSONS[topic]?.english || [];
  if (!pool.length) return LANGS[currentLang].good + ' Let us keep learning! Pick a topic above.';
  const idx = (lessonCounters[key] || 0) % pool.length;
  lessonCounters[key] = idx + 1;
  return pool[idx];
}

// ═══════════════════════════════════════════
// UI LOGIC
// ═══════════════════════════════════════════
let currentLang = 'setswana';
let currentTopic = 'letters';

function init() { updateWelcome(); renderPrompts(); renderFirstMsg(); }

function updateWelcome() {
  const L = LANGS[currentLang];
  document.getElementById('langTag').textContent = L.tag;
  document.getElementById('welcomeTitle').textContent = L.greeting;
  document.getElementById('welcomeDesc').textContent = L.desc;
}

function renderPrompts() {
  const container = document.getElementById('quickPrompts');
  container.innerHTML = '';
  LANGS[currentLang].prompts.forEach(([msg, label]) => {
    const b = document.createElement('div');
    b.className = 'qp'; b.textContent = label;
    b.onclick = () => quickSend(msg);
    container.appendChild(b);
  });
}

function renderFirstMsg() {
  document.getElementById('chatBox').innerHTML = '';
  appendMsg('ai', LANGS[currentLang].firstMsg);
}

function setLang(lang) {
  currentLang = lang;
  document.querySelectorAll('.lang-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('btn-' + lang).classList.add('active');
  updateWelcome(); renderPrompts(); renderFirstMsg();
}

function setTopic(el, topic) {
  document.querySelectorAll('.pill').forEach(p => p.classList.remove('active'));
  el.classList.add('active');
  currentTopic = topic;
  quickSend(topic);
}

function quickSend(text) {
  document.getElementById('userInput').value = text;
  sendMessage();
}

function sendMessage() {
  const input = document.getElementById('userInput');
  const text = input.value.trim();
  if (!text) return;
  input.value = '';
  appendMsg('user', text);

  const tid = showTyping();
  // Simulate a natural typing delay (600–1100ms)
  setTimeout(() => {
    removeTyping(tid);
    const reply = getTutorResponse(text);
    appendMsg('ai', reply);
  }, 600 + Math.random() * 500);
}

function appendMsg(role, html) {
  const box = document.getElementById('chatBox');
  const wrap = document.createElement('div');
  wrap.className = `message ${role}`;
  const av = document.createElement('div');
  av.className = `avatar ${role === 'ai' ? 'ai' : 'user-av'}`;
  av.textContent = role === 'ai' ? 'T' : 'Me';
  const bub = document.createElement('div');
  bub.className = 'bubble';
  bub.innerHTML = html.replace(/\n/g, '<br>');
  wrap.appendChild(av); wrap.appendChild(bub);
  box.appendChild(wrap);
  box.scrollTop = box.scrollHeight;
}

function showTyping() {
  const box = document.getElementById('chatBox');
  const d = document.createElement('div');
  d.className = 'message ai';
  const id = 'ty-' + Date.now(); d.id = id;
  d.innerHTML = `<div class="avatar ai">T</div><div class="bubble"><div class="typing"><span></span><span></span><span></span></div></div>`;
  box.appendChild(d); box.scrollTop = box.scrollHeight;
  return id;
}

function removeTyping(id) { const e = document.getElementById(id); if (e) e.remove(); }

init();
</script>
