<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Tsaya – Learn to Read & Write</title>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@400;700;900&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet"/>
<style>
  :root {
    --sun: #F5A623; --earth: #2C1A0E; --leaf: #2D7D5A;
    --leaf-light: #3DA672; --sand: #FDF6EC; --text: #1A1208;
    --muted: #7A6652; --bubble-user: #2D7D5A; --radius: 18px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'DM Sans', sans-serif; background: var(--sand); color: var(--text); min-height: 100vh; display: flex; flex-direction: column; }
  header { background: var(--earth); padding: 14px 16px; display: flex; align-items: center; gap: 12px; position: sticky; top: 0; z-index: 10; box-shadow: 0 2px 16px rgba(0,0,0,0.2); }
  .logo-icon { width: 42px; height: 42px; background: var(--sun); border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 20px; flex-shrink: 0; }
  .logo-text h1 { font-family: 'Fraunces', serif; font-size: 21px; color: #fff; line-height: 1; }
  .logo-text span { font-size: 10px; color: var(--sun); letter-spacing: 1px; text-transform: uppercase; display: block; margin-top: 2px; }
  .offline-badge { margin-left: auto; background: rgba(245,166,35,0.2); color: var(--sun); border: 1px solid rgba(245,166,35,0.4); border-radius: 20px; padding: 4px 10px; font-size: 10px; font-weight: 700; letter-spacing: 0.5px; }
  .lang-bar { background: #3d2a18; padding: 10px 16px; display: flex; gap: 8px; overflow-x: auto; scrollbar-width: none; }
  .lang-bar::-webkit-scrollbar { display: none; }
  .lang-btn { background: rgba(255,255,255,0.1); border: 1.5px solid rgba(255,255,255,0.15); border-radius: 20px; padding: 6px 14px; font-size: 12px; font-weight: 600; color: rgba(255,255,255,0.7); cursor: pointer; white-space: nowrap; transition: all 0.2s; }
  .lang-btn.active { background: var(--sun); border-color: var(--sun); color: var(--earth); }
  .lang-btn:hover:not(.active) { background: rgba(255,255,255,0.18); color: #fff; }
  .welcome-card { background: linear-gradient(135deg, var(--leaf) 0%, #1a5c3e 100%); margin: 16px 16px 0; border-radius: 20px; padding: 20px; color: #fff; position: relative; overflow: hidden; }
  .welcome-card::after { content: '◆'; position: absolute; right: 14px; top: 8px; font-size: 68px; opacity: 0.06; line-height: 1; }
  .lang-greeting-tag { display: inline-block; background: rgba(255,255,255,0.2); border-radius: 20px; padding: 3px 10px; font-size: 11px; font-weight: 600; margin-bottom: 7px; }
  .welcome-card h2 { font-family: 'Fraunces', serif; font-size: 20px; margin-bottom: 4px; }
  .welcome-card p { font-size: 13px; opacity: 0.88; line-height: 1.55; }
  .section-label { font-size: 10px; font-weight: 700; letter-spacing: 1.2px; text-transform: uppercase; color: var(--muted); padding: 14px 16px 8px; }
  .pills { display: flex; gap: 7px; padding: 0 16px; overflow-x: auto; scrollbar-width: none; }
  .pills::-webkit-scrollbar { display: none; }
  .pill { background: #fff; border: 2px solid transparent; border-radius: 30px; padding: 7px 13px; font-size: 12px; font-weight: 600; white-space: nowrap; cursor: pointer; transition: all 0.2s; color: var(--text); box-shadow: 0 1px 5px rgba(0,0,0,0.07); }
  .pill:hover, .pill.active { border-color: var(--leaf); background: var(--leaf); color: #fff; }
  .chat-wrapper { flex: 1; display: flex; flex-direction: column; padding: 14px 16px; gap: 12px; overflow-y: auto; max-height: 400px; min-height: 240px; }
  .message { display: flex; align-items: flex-end; gap: 9px; animation: fadeUp 0.3s ease; }
  @keyframes fadeUp { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
  .message.user { flex-direction: row-reverse; }
  .avatar { width: 32px; height: 32px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 13px; flex-shrink: 0; font-weight: 700; }
  .avatar.ai { background: var(--sun); color: var(--earth); }
  .avatar.user-av { background: var(--leaf); color: #fff; }
  .bubble { max-width: 80%; padding: 11px 15px; border-radius: var(--radius); font-size: 14px; line-height: 1.6; box-shadow: 0 2px 8px rgba(0,0,0,0.07); }
  .message.ai .bubble { background: #fff; border-bottom-left-radius: 4px; color: var(--text); border: 1px solid #e8e0d8; }
  .message.user .bubble { background: var(--bubble-user); color: #fff; border-bottom-right-radius: 4px; }
  .lang-tag { font-size: 10px; background: #FFF3E0; color: #E65100; padding: 2px 7px; border-radius: 8px; display: inline-block; margin-bottom: 5px; font-weight: 700; }
  .typing { display: flex; align-items: center; gap: 5px; padding: 2px 0; }
  .typing span { width: 6px; height: 6px; background: var(--muted); border-radius: 50%; animation: bounce 1.2s infinite; }
  .typing span:nth-child(2) { animation-delay: 0.2s; }
  .typing span:nth-child(3) { animation-delay: 0.4s; }
  @keyframes bounce { 0%,60%,100% { transform: translateY(0); } 30% { transform: translateY(-5px); } }
  .quick-prompts { display: flex; gap: 7px; flex-wrap: wrap; padding: 0 16px 10px; }
  .qp { background: #fff; border: 1.5px solid #ddd6cc; border-radius: 20px; padding: 5px 11px; font-size: 11px; font-weight: 500; cursor: pointer; color: var(--muted); transition: all 0.18s; }
  .qp:hover { border-color: var(--leaf); color: var(--leaf); background: #f0f9f5; }
  .input-area { padding: 10px 16px 18px; background: var(--sand); border-top: 1px solid #e8e0d8; }
  .input-row { display: flex; gap: 8px; background: #fff; border-radius: 30px; padding: 5px 5px 5px 14px; box-shadow: 0 2px 12px rgba(0,0,0,0.1); border: 2px solid transparent; transition: border-color 0.2s; }
  .input-row:focus-within { border-color: var(--leaf); }
  #userInput { flex: 1; border: none; outline: none; background: transparent; font-family: 'DM Sans', sans-serif; font-size: 14px; color: var(--text); height: 34px; line-height: 34px; padding: 0; }
  #userInput::placeholder { color: #b5a898; }
  #sendBtn { width: 40px; height: 40px; background: var(--leaf); border: none; border-radius: 50%; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: background 0.2s, transform 0.1s; flex-shrink: 0; }
  #sendBtn:hover { background: var(--leaf-light); }
  #sendBtn:active { transform: scale(0.92); }
  #sendBtn svg { width: 17px; height: 17px; fill: #fff; }
</style>
</head>
<body>

<header>
  <div class="logo-icon">📖</div>
  <div class="logo-text"><h1>Tsaya</h1><span>AI Literacy Tutor · Botswana</span></div>
  <div class="offline-badge">⚡ OFFLINE</div>
</header>

<div class="lang-bar">
  <button class="lang-btn active" onclick="setLang('setswana')" id="btn-setswana">🇧🇼 Setswana</button>
  <button class="lang-btn" onclick="setLang('kalanga')" id="btn-kalanga">🌿 TjiKalanga</button>
  <button class="lang-btn" onclick="setLang('kgalagadi')" id="btn-kgalagadi">🏜️ Shekgalagari</button>
  <button class="lang-btn" onclick="setLang('mbukushu')" id="btn-mbukushu">🌊 Thimbukushu</button>
  <button class="lang-btn" onclick="setLang('english')" id="btn-english">🇬🇧 English</button>
</div>

<div class="welcome-card">
  <div class="lang-greeting-tag" id="langTag">🇧🇼 Setswana</div>
  <h2 id="welcomeTitle">Dumela! Welcome 👋</h2>
  <p id="welcomeDesc">Ke morutabana wa gago. Re ithuta mmogo — go bala, go kwala, le mafoko. Ga go mathata. Re simolola!</p>
</div>

<div class="section-label">Choose a topic</div>
<div class="pills">
  <div class="pill active" onclick="setTopic(this,'letters')">🔤 Letters</div>
  <div class="pill" onclick="setTopic(this,'words')">💬 Words</div>
  <div class="pill" onclick="setTopic(this,'sentences')">📄 Sentences</div>
  <div class="pill" onclick="setTopic(this,'numbers')">🔢 Numbers</div>
  <div class="pill" onclick="setTopic(this,'daily')">🏠 Daily Life</div>
  <div class="pill" onclick="setTopic(this,'writing')">✏️ Writing</div>
</div>

<div class="chat-wrapper" id="chatBox"></div>
<div class="quick-prompts" id="quickPrompts"></div>

<div class="input-area">
  <div class="input-row">
    <input type="text" id="userInput" placeholder="Type your message here…" onkeydown="if(event.key==='Enter') sendMessage()"/>
    <button id="sendBtn" onclick="sendMessage()">
      <svg viewBox="0 0 24 24"><path d="M2 21l21-9L2 3v7l15 2-15 2z"/></svg>
    </button>
  </div>
</div>

<script>
// ═══════════════════════════════════════════
// LANGUAGE DATA
// ═══════════════════════════════════════════
const LANGS = {
  setswana: {
    tag:'🇧🇼 Setswana', greeting:'Dumela! Welcome 👋',
    desc:'Ke morutabana wa gago. Re ithuta Setswana mmogo — go bala, go kwala, le go bua. Ga go potlako. Re simolola!',
    firstMsg:`<div class="lang-tag">Setswana · Lesson</div>Dumela! Ke Tsaya, morutabana wa gago. 🌟<br><br>Re tla ithuta Setswana mmogo — puo ya setshaba sa Botswana!<br><br>Lefoko la ntlha:<br>👋 <b>Dumela</b> = <b>Hello / Greetings</b><br><small style="color:#7A6652">(say it: doo-MEH-la — one person)</small><br>👋 <b>Dumelang</b> = <b>Hello everyone</b><br><small style="color:#7A6652">(doo-meh-LANG — greeting a group)</small><br><br>Leka go bua: <b>Dumela!</b> — then tell me your name!`,
    prompts:[['alphabet','Learn Letters'],['numbers','Count 1–10'],['words','Key words'],['name','Write my name']],
    good:'Well done! (Sentle!)', great:'Excellent! (O dirile sentle thata!)', tryAgain:'Try again — you can do it! (Leka gape!)', keep:'Keep going! (Tswelela!)'
  },
  kalanga: {
    tag:'🌿 TjiKalanga', greeting:'Dumilani! Welcome 👋',
    desc:'Hello! I will teach you TjiKalanga — a beautiful language of Botswana. We learn together, slowly. No rush!',
    firstMsg:`<div class="lang-tag">TjiKalanga · Lesson</div>Hello! I am Tsaya, your teacher. 🌟<br><br>Today we learn <b>TjiKalanga</b> — a language spoken in northeast Botswana by the Kalanga people.<br><br>Your first TjiKalanga word:<br>👋 <b>Dumilani</b> = <b>Hello / Good morning</b><br><small style="color:#7A6652">(say it: doo-mee-LAH-nee)</small><br><br>Try saying: <b>Dumilani!</b> Then tell me — what is your name?`,
    prompts:[['alphabet','Learn Letters'],['numbers','Count 1–10'],['words','Learn Words'],['name','Write my name']],
    good:'Well done! (Zwavhudi!)', great:'Excellent! (Zwavhudi nga maanda!)', tryAgain:'Try again — you can do it!', keep:'Keep going!'
  },
  kgalagadi: {
    tag:'🏜️ Shekgalagari', greeting:'Dumela! Welcome 👋',
    desc:'Hello! I will teach you Shekgalagari — the language of the Kgalagadi people of southwest Botswana. We learn together, slowly. No rush!',
    firstMsg:`<div class="lang-tag">Shekgalagari · Lesson</div>Hello! I am Tsaya, your teacher. 🌟<br><br>Today we learn <b>Shekgalagari</b> — a language spoken by the Kgalagadi people in the Kalahari desert of southwest Botswana.<br><br>Your first Shekgalagari word:<br>☀️ <b>Leatjsi</b> = <b>sun / day</b><br><small style="color:#7A6652">(say it: leh-AT-see — same meaning as "letsatsi" in Setswana!)</small><br><br>Try saying: <b>Leatjsi!</b> Then tell me — what is your name?`,
    prompts:[['alphabet','Learn Letters'],['numbers','Count 1–10'],['words','Learn Words'],['name','Write my name']],
    good:'Well done! (Sentile!)', great:'Excellent! (Sentile thata!)', tryAgain:'Try again — you can do it!', keep:'Keep going! (Tswelela!)'
  },
  mbukushu: {
    tag:'🌊 Thimbukushu', greeting:'Mbukuuru! Welcome 👋',
    desc:'Hello! I will teach you Thimbukushu — a language of the Okavango Delta in Botswana. We learn together, slowly. No rush!',
    firstMsg:`<div class="lang-tag">Thimbukushu · Lesson</div>Hello! I am Tsaya, your teacher. 🌟<br><br>Today we learn <b>Thimbukushu</b> — a language spoken by the Mbukushu people of the Okavango Delta in Botswana.<br><br>Your first Thimbukushu word:<br>☀️ <b>Diyuwa</b> = <b>sun</b><br><small style="color:#7A6652">(say it: dee-YOO-wa)</small><br><br>Try saying: <b>Diyuwa!</b> Then tell me — what is your name?`,
    prompts:[['alphabet','Learn Letters'],['numbers','Count 1–10'],['words','Learn Words'],['name','Write my name']],
    good:'Well done! (Nawa!)', great:'Excellent work!', tryAgain:'Try again — you can do it!', keep:'Keep going!'
  },
  english: {
    tag:'🇬🇧 English', greeting:'Hello! Welcome 👋',
    desc:'I am your friendly teacher. We learn English together — reading, writing, and everyday words. No rush. No judgment. Just learning!',
    firstMsg:`<div class="lang-tag">English · Lesson</div>Hello! I am Tsaya, your learning helper. 🌟<br><br>Today we learn <b>English</b> — the official language of Botswana, used in schools, workplaces, shops and clinics.<br><br>Your first English word:<br>👋 <b>Hello</b> = a greeting when you meet someone<br><small style="color:#7A6652">(say it: HEH-lo)</small><br><br>Try saying: <b>Hello!</b> Then tell me — what is your name?`,
    prompts:[['alphabet','Learn Letters'],['numbers','Count 1–10'],['words','Key words'],['name','Write my name']],
    good:'Well done!', great:'Excellent work! Keep it up!', tryAgain:'Try again — you can do it!', keep:'Keep going!'
  }
};

// ═══════════════════════════════════════════
// BUILT-IN LESSON CONTENT (offline AI brain)
// ═══════════════════════════════════════════
const LESSONS = {

  // ─── ALPHABET ───
  alphabet: {
    setswana: [
      `<div class="lang-tag">Setswana · Letters A–D</div>Re simolola ka ditlhaka tsa Setswana! 🔤<br><br>Tlhaka nngwe le nngwe e na le lefoko la Setswana:<br><br><b>A</b> — <b>Ame</b> = <i>water (old form) / Metsi</i> <small style="color:#7A6652">(AH-meh)</small><br><b>B</b> — <b>Bogobe</b> = <i>porridge</i> <small style="color:#7A6652">(bo-GOH-beh) — national food of Botswana!</small><br><b>B</b> — <b>Bua</b> = <i>speak / talk</i> <small style="color:#7A6652">(BOO-ah) — "Bua Setswana!" = Speak Setswana!</small><br><b>D</b> — <b>Dumela</b> = <i>hello / greetings</i> <small style="color:#7A6652">(doo-MEH-la) — most important word!</small><br><br>Bua ditlhaka tse: A… B… D…<br>Ke tlhaka efe e simolola leina la gago?`,
      `<div class="lang-tag">Setswana · Letters G–L</div>Sentle! 🌟 Re tswelela:<br><br><b>G</b> — <b>Gaborone</b> = <i>capital city of Botswana</i> <small style="color:#7A6652">(ga-bo-ROH-neh)</small><br><b>I</b> — <b>Ithuta</b> = <i>to learn / study</i> <small style="color:#7A6652">(ee-THOO-ta) — what you are doing right now!</small><br><b>K</b> — <b>Kwala</b> = <i>to write</i> <small style="color:#7A6652">(KWA-la) — "Ke batla go kwala" = I want to write</small><br><b>L</b> — <b>Leina</b> = <i>name</i> <small style="color:#7A6652">(LEH-ee-na) — "Leina la me ke ___" = My name is ___</small><br><br>Leka go bua: G… I… K… L…<br>O ithuta (you are learning) Setswana — sentle thata! 🌟`,
      `<div class="lang-tag">Setswana · Letters M–P</div>O dirile sentle thata! 🎉<br><br><b>M</b> — <b>Metsi</b> = <i>water</i> <small style="color:#7A6652">(MET-see) — "Ke batla metsi" = I want water</small><br><b>M</b> — <b>Mma</b> = <i>ma'am / mother</i> <small style="color:#7A6652">(mm-AH) — used to greet women respectfully</small><br><b>N</b> — <b>Ngaka</b> = <i>doctor</i> <small style="color:#7A6652">(ng-AH-ka)</small><br><b>N</b> — <b>Ntlo</b> = <i>house</i> <small style="color:#7A6652">(nn-TLO)</small><br><b>P</b> — <b>Pula</b> = <i>rain / money / cheers!</i> <small style="color:#7A6652">(POO-la) — motto of Botswana!</small><br><br>Pula is the national motto AND the currency. It means "let there be rain." 🌧️`,
      `<div class="lang-tag">Setswana · Letters R–T</div>Tswelela! 🌟 More letters:<br><br><b>R</b> — <b>Rra</b> = <i>sir / father</i> <small style="color:#7A6652">(rr-AH) — used to greet men respectfully</small><br><b>S</b> — <b>Sekolo</b> = <i>school</i> <small style="color:#7A6652">(seh-KOH-lo)</small><br><b>S</b> — <b>Sentle</b> = <i>well / good / nicely</i> <small style="color:#7A6652">(SEN-tleh) — "O tsogile sentle?" = Did you wake up well?</small><br><b>T</b> — <b>Tsamaya</b> = <i>go / travel</i> <small style="color:#7A6652">(tsa-MAH-ya) — "Tsamaya sentle" = Go well (goodbye)</small><br><br>Say them: R… S… T…<br>Now you know how to say hello AND goodbye in Setswana! 🎉`
    ],
    kalanga: [
      `<div class="lang-tag">TjiKalanga · Letters A–D</div>Let's learn TjiKalanga letters! 🔤<br><br>TjiKalanga uses the same A–Z alphabet as English. Each letter below has a real TjiKalanga word from the dictionary:<br><br><b>A</b> — <b>Adzima</b> = <i>to lend / to borrow</i> <small style="color:#7A6652">(a-DZEE-ma)</small><br><b>B</b> — <b>Bana</b> = <i>children</i> <small style="color:#7A6652">(BAH-na)</small><br><b>C</b> — <b>Chedza</b> = <i>light</i> <small style="color:#7A6652">(CHEH-dza)</small><br><b>D</b> — <b>Dombo</b> = <i>mountain / hill</i> <small style="color:#7A6652">(DOM-bo)</small><br><br>Say each letter: A… B… C… D…<br>Which letter starts YOUR name?`,
      `<div class="lang-tag">TjiKalanga · Letters E–H</div>Well done! 🌟 Letters E to H:<br><br><b>E</b> — <b>Enda</b> = <i>to go / go away</i> <small style="color:#7A6652">(EN-da)</small><br><b>F</b> — <b>Fema</b> = <i>to breathe</i> <small style="color:#7A6652">(FEH-ma)</small><br><b>G</b> — <b>Gala</b> = <i>to sit / to live somewhere</i> <small style="color:#7A6652">(GAH-la)</small><br><b>H</b> — <b>Hobe</b> = <i>fish</i> <small style="color:#7A6652">(HOH-beh)</small><br><br>Say them: E… F… G… H…<br>Which word means "to breathe"? (hint: starts with F!)`,
      `<div class="lang-tag">TjiKalanga · Letters I–N</div>Excellent! 🎉 Letters I to N:<br><br><b>I</b> — <b>Ita</b> = <i>to do / to make</i> <small style="color:#7A6652">(EE-ta)</small><br><b>J</b> — <b>Ja</b> = <i>to eat</i> <small style="color:#7A6652">(jah)</small><br><b>K</b> — <b>Kwala</b> = <i>to write</i> <small style="color:#7A6652">(KWA-la)</small><br><b>L</b> — <b>Leba</b> = <i>to talk / speak</i> <small style="color:#7A6652">(LEH-ba)</small><br><b>M</b> — <b>Moto</b> = <i>fire / heat</i> <small style="color:#7A6652">(MOH-to)</small><br><b>N</b> — <b>Ngano</b> = <i>folk tales / stories</i> <small style="color:#7A6652">(ng-AH-no)</small><br><br>Right now you are doing <b>Ita</b> (doing/making) great work!`,
      `<div class="lang-tag">TjiKalanga · Letters P–Z</div>Final letters! 🌟 P to Z:<br><br><b>P</b> — <b>Penga</b> = <i>to go mad / be crazy</i> <small style="color:#7A6652">(fun word! PEN-ga)</small><br><b>S</b> — <b>Shango</b> = <i>country / the world</i> <small style="color:#7A6652">(SHAN-go)</small><br><b>T</b> — <b>Tenda</b> = <i>to thank</i> <small style="color:#7A6652">(TEN-da)</small><br><b>V</b> — <b>Vula</b> = <i>water / rain</i> 💧 <small style="color:#7A6652">(VOO-la)</small><br><b>W</b> — <b>Woma</b> = <i>to dry</i> <small style="color:#7A6652">(WOH-ma)</small><br><b>Z</b> — <b>Zina</b> = <i>name</i> <small style="color:#7A6652">(ZEE-na)</small><br><br>You now know TjiKalanga words for every letter! 🎉 Which was your favourite?`
    ],
    kgalagadi: [
      `<div class="lang-tag">Shekgalagari · Letters A–M</div>Let's learn Shekgalagari letters! 🔤<br><br>Shekgalagari uses the same A–Z alphabet. Each letter has a real Shekgalagari word:<br><br><b>I</b> — <b>Itu</b> = <i>house</i> <small style="color:#7A6652">(EE-too) — Setswana: ntlo</small><br><b>K</b> — <b>Kgalariyame</b> = <i>my brother / sister</i> <small style="color:#7A6652">(ka-la-REE-ya-meh)</small><br><b>L</b> — <b>Leatjsi</b> = <i>sun / day</i> <small style="color:#7A6652">(leh-AT-see) — Setswana: letsatsi</small><br><b>M</b> — <b>Maze</b> = <i>water</i> <small style="color:#7A6652">(MAH-zeh) — Setswana: metsi</small><br><b>M</b> — <b>Morimo</b> = <i>God</i> <small style="color:#7A6652">(mo-REE-mo) — same as Setswana!</small><br><br>Say each letter: I… K… L… M…<br>Which letter starts YOUR name?`,
      `<div class="lang-tag">Shekgalagari · Letters M–R</div>Well done! 🌟 More Shekgalagari letters:<br><br><b>M</b> — <b>Mantjsana</b> = <i>boy</i> <small style="color:#7A6652">(man-TCHA-na) — Setswana: mosimane</small><br><b>M</b> — <b>Moriso</b> = <i>milk</i> <small style="color:#7A6652">(mo-REE-so) — Setswana: mashi</small><br><b>M</b> — <b>Mosezana</b> = <i>girl</i> <small style="color:#7A6652">(mo-seh-ZAH-na) — Setswana: mosetsana</small><br><b>M</b> — <b>Moqho</b> = <i>person</i> <small style="color:#7A6652">(MO-qo) — Setswana: motho</small><br><b>M</b> — <b>Motjhwana</b> = <i>child</i> <small style="color:#7A6652">(mo-TCHWAH-na) — Setswana: ngwana</small><br><br>Notice how many Shekgalagari words start with M? Very common in Bantu languages!`,
      `<div class="lang-tag">Shekgalagari · Letters R–U</div>Excellent! 🎉 More letters:<br><br><b>R</b> — <b>Rimho / Rikgomo</b> = <i>cattle / cows</i> <small style="color:#7A6652">(REE-mo) — Setswana: dikgomo</small><br><b>R</b> — <b>Rula</b> = <i>sit down!</i> <small style="color:#7A6652">(ROO-la) — Setswana: nna</small><br><b>S</b> — <b>Shekole</b> = <i>school</i> <small style="color:#7A6652">(sheh-KOH-leh) — Setswana: sekolo</small><br><b>U</b> — <b>Uzwa</b> = <i>hear / listen</i> <small style="color:#7A6652">(OO-zwa) — Setswana: utlwa</small><br><br>Say them: R… S… U…<br>Can you hear the connection between Shekgalagari and Setswana?`
    ],
    mbukushu: [
      `<div class="lang-tag">Thimbukushu · Letters A–D</div>Let's learn Thimbukushu letters! 🔤<br><br>Thimbukushu uses the same A–Z alphabet. Each letter has a real verified word:<br><br><b>A</b> — <b>Ame</b> = <i>I / me</i> <small style="color:#7A6652">(AH-meh) — e.g. "Ame kughamba Thimbukushu" = I speak Thimbukushu</small><br><b>A</b> — <b>Aye</b> = <i>he / she</i> <small style="color:#7A6652">(AH-yeh) — e.g. "Aye kuna kuhonga" = He/she is teaching</small><br><b>D</b> — <b>Diyuwa</b> = <i>sun</i> <small style="color:#7A6652">(dee-YOO-wa)</small><br><b>D</b> — <b>Dyaro</b> = <i>today</i> <small style="color:#7A6652">(DYA-ro) — e.g. "Dyaro ne mepo" = Today it's cold</small><br><br>Say each letter: A… D…<br>Which letter starts YOUR name?`,
      `<div class="lang-tag">Thimbukushu · Letters G–M</div>Well done! 🌟 More Thimbukushu letters:<br><br><b>G</b> — <b>Ghuva</b> = <i>lazy</i> <small style="color:#7A6652">(GHOO-va) — "Mbadi kukaranga ghuva" = Don't be lazy!</small><br><b>H</b> — <b>Hanu</b> = <i>people</i> <small style="color:#7A6652">(HAH-noo) — "Hanu hahaka mandimi" = People like languages</small><br><b>K</b> — <b>Kamwe</b> = <i>mosquito</i> <small style="color:#7A6652">(KAM-weh)</small><br><b>K</b> — <b>Kutoya</b> = <i>reading</i> <small style="color:#7A6652">(koo-TOY-a) — "Ame na haka kutoya" = I like reading</small><br><b>M</b> — <b>Maranga</b> = <i>late</i> <small style="color:#7A6652">(ma-RAN-ga)</small><br><b>M</b> — <b>Mushere</b> = <i>friend</i> <small style="color:#7A6652">(moo-SHEH-reh)</small><br><br>Right now you are doing <b>Kutoya</b> (reading)! Well done!`,
      `<div class="lang-tag">Thimbukushu · Letters N–W</div>Excellent! 🎉 Final Thimbukushu letters:<br><br><b>N</b> — <b>Na shana</b> = <i>I want</i> <small style="color:#7A6652">(na SHA-na) — "Na shana kudimuka" = I want to know</small><br><b>O</b> — <b>Owe</b> = <i>you</i> <small style="color:#7A6652">(OH-weh) — "Owe wa dimuka kughamba Thimbukushu" = You know how to speak Thimbukushu</small><br><b>R</b> — <b>Rudimi</b> = <i>tongue</i> <small style="color:#7A6652">(roo-DEE-mee)</small><br><b>T</b> — <b>Thiraro</b> = <i>peace</i> <small style="color:#7A6652">(thee-RAH-ro) — "Thiraro ne tha reta makukwatathano" = Peace brings collaboration</small><br><b>T</b> — <b>Tjire</b> = <i>run</i> <small style="color:#7A6652">(TJEE-reh)</small><br><b>W</b> — <b>Wiye</b> = <i>come</i> <small style="color:#7A6652">(WEE-yeh) — "Wiye kudimbo" = Come home</small><br><br>You now know Thimbukushu words for many letters! Which was your favourite?`
    ],
    english: [
      `<div class="lang-tag">English · Letters A–F</div>Let's learn the English alphabet! 🔤<br><br>Each letter comes with a word you know and a word used in Botswana:<br><br><b>A</b> — <b>Apple</b> 🍎 / <b>Africa</b> 🌍<br><b>B</b> — <b>Bread</b> 🍞 / <b>Botswana</b> 🇧🇼<br><b>C</b> — <b>Clinic</b> 🏥 / <b>Children</b> 👶<br><b>D</b> — <b>Doctor</b> 👨‍⚕️ / <b>Door</b> 🚪<br><b>E</b> — <b>Egg</b> 🥚 / <b>English</b> 📖<br><b>F</b> — <b>Food</b> 🍽️ / <b>Farm</b> 🌾<br><br>Say each letter: A… B… C… D… E… F…<br>Which letter starts YOUR name?`,
      `<div class="lang-tag">English · Letters G–L</div>Well done! 🌟 Letters G to L:<br><br><b>G</b> — <b>Goat</b> 🐐 / <b>Gaborone</b> 🏙️<br><b>H</b> — <b>House</b> 🏠 / <b>Hospital</b> 🏥<br><b>I</b> — <b>Iron</b> 🔩 / <b>Important</b> ⭐<br><b>J</b> — <b>Job</b> 💼 / <b>Journey</b> 🚶<br><b>K</b> — <b>Knife</b> 🔪 / <b>Kalahari</b> 🏜️<br><b>L</b> — <b>Learn</b> 📚 / <b>Language</b> 🗣️<br><br>Say them: G… H… I… J… K… L…<br>Can you think of YOUR own word for any of these letters?`,
      `<div class="lang-tag">English · Letters M–R</div>Excellent! 🎉 Letters M to R:<br><br><b>M</b> — <b>Money</b> 💰 / <b>Market</b> 🛒<br><b>N</b> — <b>Name</b> 🏷️ / <b>Number</b> 🔢<br><b>O</b> — <b>Orange</b> 🍊 / <b>Office</b> 🏢<br><b>P</b> — <b>Paper</b> 📄 / <b>Pen</b> ✏️<br><b>Q</b> — <b>Queue</b> 🧍 / <b>Question</b> ❓<br><b>R</b> — <b>Read</b> 📖 / <b>Receipt</b> 🧾<br><br>These words are used every day in shops, offices and schools!`,
      `<div class="lang-tag">English · Letters S–Z</div>Final letters! 🌟 S to Z:<br><br><b>S</b> — <b>School</b> 🏫 / <b>Sign</b> ✍️<br><b>T</b> — <b>Teacher</b> 👩‍🏫 / <b>Time</b> ⏰<br><b>U</b> — <b>Understand</b> 💡 / <b>Useful</b> 🔧<br><b>V</b> — <b>Village</b> 🏘️ / <b>Vote</b> 🗳️<br><b>W</b> — <b>Water</b> 💧 / <b>Write</b> ✍️<br><b>X Y Z</b> — <b>X-ray</b> / <b>Year</b> / <b>Zero</b><br><br>You now know all 26 letters of the English alphabet! 🎉<br>Which letter appears most in YOUR name?`
    ]

  numbers: {
    setswana: [
      `<div class="lang-tag">Setswana · Numbers 1–5</div>Re ithute go bala! 🔢<br><br>Nomoro → Setswana → go bua jang:<br><br><b>1</b> → <b>Nngwe</b> <small style="color:#7A6652">(nn-GWEH)</small> = one<br><b>2</b> → <b>Pedi</b> <small style="color:#7A6652">(PEH-dee)</small> = two<br><b>3</b> → <b>Tharo</b> <small style="color:#7A6652">(TAH-ro)</small> = three<br><b>4</b> → <b>Nne</b> <small style="color:#7A6652">(nn-EH)</small> = four<br><b>5</b> → <b>Tlhano</b> <small style="color:#7A6652">(tl-HAH-no)</small> = five<br><br>Bala mmogo le nna: Nngwe… Pedi… Tharo… Nne… Tlhano…<br>Pula e le kae mo phakeng ya gago? (How much money in your pocket? 😄)`,
      `<div class="lang-tag">Setswana · Numbers 6–10</div>Sentle! 🌟 Re tswelele:<br><br><b>6</b> → <b>Thataro</b> <small style="color:#7A6652">(tha-TAH-ro)</small> = six<br><b>7</b> → <b>Supa</b> <small style="color:#7A6652">(SOO-pa)</small> = seven<br><b>8</b> → <b>Robedi</b> <small style="color:#7A6652">(ro-BEH-dee)</small> = eight<br><b>9</b> → <b>Robongwe</b> <small style="color:#7A6652">(ro-BON-gweh)</small> = nine<br><b>10</b> → <b>Lesome</b> <small style="color:#7A6652">(leh-SOH-meh)</small> = ten<br><br>O feditse! 🎉 Leka go bala go tswa go 1 go ya go 10!<br>O na le dilemo di le kae? (How old are you? Say it!)`,
      `<div class="lang-tag">Setswana · Numbers 11–20</div>Sentle thata! 🎉 Nomoro tse dingwe:<br><br>Mo Setswaneng, re kopanya <b>Lesome</b> (10) le nomoro e nnye:<br><br><b>11</b> → <b>Lesome le nngwe</b> = ten and one<br><b>12</b> → <b>Lesome le pedi</b> = ten and two<br><b>15</b> → <b>Lesome le tlhano</b> = ten and five<br><b>20</b> → <b>Masome a mabedi</b> <small style="color:#7A6652">(ma-SOH-meh ah ma-BEH-dee)</small> = twenty<br><br>Pattern: <b>Lesome</b> + <b>le</b> (and) + the small number!`,
      `<div class="lang-tag">Setswana · Numbers 21–30</div>Tswelela! 🌟 Nomoro 21–30:<br><br><b>21</b> → <b>Masome a mabedi le nngwe</b> = twenty one<br><b>25</b> → <b>Masome a mabedi le tlhano</b> = twenty five<br><b>30</b> → <b>Masome a mararo</b> <small style="color:#7A6652">(ma-SOH-meh ah ma-RAH-ro)</small> = thirty<br><br>O na le dilemo di le kae? Leka go bua nomoro ya dilemo tsa gago mo Setswaneng! 🎉<br>O dira sentle thata!`
    ],
    kalanga: [
      `<div class="lang-tag">TjiKalanga · Numbers 1–5</div>Let's count in TjiKalanga! 🔢<br><br>Number → TjiKalanga → how to say it:<br><br><b>1</b> → <b>N'ompela</b> <small style="color:#7A6652">(nn-OM-peh-la)</small> = one<br><b>2</b> → <b>Mbili</b> <small style="color:#7A6652">(mm-BEE-lee)</small> = two<br><b>3</b> → <b>Thatu</b> <small style="color:#7A6652">(TAH-too)</small> = three<br><b>4</b> → <b>Nna</b> <small style="color:#7A6652">(NNA)</small> = four<br><b>5</b> → <b>Shanu</b> <small style="color:#7A6652">(SHA-noo)</small> = five<br><br>Say them out loud: N'ompela… Mbili… Thatu… Nna… Shanu…<br>How many fingers on one hand? Say it in TjiKalanga!`,
      `<div class="lang-tag">TjiKalanga · Numbers 6–10</div>Well done! 🌟 Keep counting:<br><br><b>6</b> → <b>Tanatu</b> <small style="color:#7A6652">(ta-NAH-too)</small> = six<br><b>7</b> → <b>Nomwe</b> <small style="color:#7A6652">(NOM-weh)</small> = seven<br><b>8</b> → <b>Robedi</b> <small style="color:#7A6652">(ro-BEH-dee)</small> = eight<br><b>9</b> → <b>Pfumbamwe</b> <small style="color:#7A6652">(pfoom-BAM-weh)</small> = nine<br><b>10</b> → <b>Gumi</b> <small style="color:#7A6652">(GOO-mee)</small> = ten<br><br>You now know 1–10! 🎉 Try counting backwards: Gumi… Pfumbamwe… Robedi…`,
      `<div class="lang-tag">TjiKalanga · Numbers 11–15</div>Excellent! 🎉 Now let's go further:<br><br>In TjiKalanga, numbers above 10 are built by combining <b>Gumi</b> (10) + the smaller number:<br><br><b>11</b> → <b>Gumi N'ompela</b> = ten and one<br><b>12</b> → <b>Gumi Mbili</b> = ten and two<br><b>13</b> → <b>Gumi Thatu</b> = ten and three<br><b>14</b> → <b>Gumi Nna</b> = ten and four<br><b>15</b> → <b>Gumi Shanu</b> = ten and five<br><br>See the pattern? Just say <b>Gumi</b> + the number you already know!`,
      `<div class="lang-tag">TjiKalanga · Numbers 16–20</div>You are doing great! 🌟 Continuing:<br><br><b>16</b> → <b>Gumi Tanatu</b> = ten and six<br><b>17</b> → <b>Gumi Nomwe</b> = ten and seven<br><b>18</b> → <b>Gumi Robedi</b> = ten and eight<br><b>19</b> → <b>Gumi Pfumbamwe</b> = ten and nine<br><b>20</b> → <b>Makumi Mbili</b> <small style="color:#7A6652">(ma-KOO-mee MM-bee-lee)</small> = twenty (two tens)<br><br>Practice tip: <b>Makumi</b> means "groups of ten". So 20 = two groups of ten!`,
      `<div class="lang-tag">TjiKalanga · Numbers 21–25</div>Almost there! 🌟 Numbers 21 to 25:<br><br><b>21</b> → <b>Makumi Mbili N'ompela</b> = twenty one<br><b>22</b> → <b>Makumi Mbili Mbili</b> = twenty two<br><b>23</b> → <b>Makumi Mbili Thatu</b> = twenty three<br><b>24</b> → <b>Makumi Mbili Nna</b> = twenty four<br><b>25</b> → <b>Makumi Mbili Shanu</b> = twenty five<br><br>The pattern is always: <b>Makumi Mbili</b> (20) + the small number.<br>How old are you? Can you say your age in TjiKalanga?`,
      `<div class="lang-tag">TjiKalanga · Numbers 26–30</div>Final stretch! 🎉 Numbers 26 to 30:<br><br><b>26</b> → <b>Makumi Mbili Tanatu</b> = twenty six<br><b>27</b> → <b>Makumi Mbili Nomwe</b> = twenty seven<br><b>28</b> → <b>Makumi Mbili Robedi</b> = twenty eight<br><b>29</b> → <b>Makumi Mbili Pfumbamwe</b> = twenty nine<br><b>30</b> → <b>Makumi Thatu</b> <small style="color:#7A6652">(ma-KOO-mee TAH-too)</small> = thirty<br><br>You now count to 30 in TjiKalanga! 🏆<br>That is <b>Makumi Thatu</b> — well done!`
    ],
    kgalagadi: [
      `<div class="lang-tag">Shekgalagari · Numbers 1–5</div>Let's count in Shekgalagari! 🔢<br><br>Shekgalagari numbers are very similar to Setswana — you may already know some!<br><br><b>1</b> → <b>Nngwe</b> <small style="color:#7A6652">(nn-GWEH)</small> = one<br><b>2</b> → <b>Pedi</b> <small style="color:#7A6652">(PEH-dee)</small> = two<br><b>3</b> → <b>Tharo</b> <small style="color:#7A6652">(TAH-ro)</small> = three<br><b>4</b> → <b>Nne</b> <small style="color:#7A6652">(nn-EH)</small> = four<br><b>5</b> → <b>Tlhano</b> <small style="color:#7A6652">(tl-HAH-no)</small> = five<br><br>Say them: Nngwe… Pedi… Tharo… Nne… Tlhano…<br>How many people are in your family?`,
      `<div class="lang-tag">Shekgalagari · Numbers 6–10</div>Well done! 🌟 Keep counting:<br><br><b>6</b> → <b>Thataro</b> <small style="color:#7A6652">(tha-TAH-ro)</small> = six<br><b>7</b> → <b>Supa</b> <small style="color:#7A6652">(SOO-pa)</small> = seven<br><b>8</b> → <b>Robedi</b> <small style="color:#7A6652">(ro-BEH-dee)</small> = eight<br><b>9</b> → <b>Robongwe</b> <small style="color:#7A6652">(ro-BON-gweh)</small> = nine<br><b>10</b> → <b>Lesome</b> <small style="color:#7A6652">(leh-SOH-meh)</small> = ten<br><br>You know 1–10 in Shekgalagari! 🎉<br>Try counting backwards: Lesome… Robongwe… Robedi…`,
      `<div class="lang-tag">Shekgalagari · Numbers 11–20</div>Excellent! 🎉 Numbers 11–20:<br><br>In Shekgalagari, we build numbers the same way as Setswana — <b>Lesome</b> (10) + the small number:<br><br><b>11</b> → <b>Lesome le nngwe</b> = ten and one<br><b>12</b> → <b>Lesome le pedi</b> = ten and two<br><b>15</b> → <b>Lesome le tlhano</b> = ten and five<br><b>20</b> → <b>Masome a mabedi</b> <small style="color:#7A6652">(ma-SOH-meh ah ma-BEH-dee)</small> = twenty<br><br><b>Masome</b> means "groups of ten" — 20 = two groups of ten!`,
      `<div class="lang-tag">Shekgalagari · Numbers 21–30</div>Almost there! 🌟 Numbers 21–30:<br><br><b>21</b> → <b>Masome a mabedi le nngwe</b> = twenty one<br><b>22</b> → <b>Masome a mabedi le pedi</b> = twenty two<br><b>25</b> → <b>Masome a mabedi le tlhano</b> = twenty five<br><b>30</b> → <b>Masome a mararo</b> <small style="color:#7A6652">(ma-SOH-meh ah ma-RAH-ro)</small> = thirty<br><br>Pattern: <b>Masome a mabedi</b> (20) + <b>le</b> (and) + the small number.<br>How old are you? Say your age in Shekgalagari! 🎉`

    mbukushu: [
      `<div class="lang-tag">Thimbukushu · Numbers 1–5</div>Let's count in Thimbukushu! 🔢<br><br>Number → Thimbukushu word → how to say it:<br><br><b>1</b> → <b>Kamwe</b> <small style="color:#7A6652">(KAM-weh)</small> = one<br><b>2</b> → <b>Mbali</b> <small style="color:#7A6652">(mm-BAH-lee)</small> = two<br><b>3</b> → <b>Tatu</b> <small style="color:#7A6652">(TAH-too)</small> = three<br><b>4</b> → <b>Ina</b> <small style="color:#7A6652">(EE-na)</small> = four<br><b>5</b> → <b>Itano</b> <small style="color:#7A6652">(ee-TAH-no)</small> = five<br><br>Say them out loud: Kamwe… Mbali… Tatu… Ina… Itano…<br>How many people are in your home? Say it in Thimbukushu!`,
      `<div class="lang-tag">Thimbukushu · Numbers 6–10</div>Well done! 🌟 Keep counting:<br><br><b>6</b> → <b>Itanhatu</b> <small style="color:#7A6652">(ee-tan-HAH-too)</small> = six<br><b>7</b> → <b>Nomwe</b> <small style="color:#7A6652">(NOM-weh)</small> = seven<br><b>8</b> → <b>Isere</b> <small style="color:#7A6652">(ee-SEH-reh)</small> = eight<br><b>9</b> → <b>Ipfumbamwe</b> <small style="color:#7A6652">(ee-pfoom-BAM-weh)</small> = nine<br><b>10</b> → <b>Likumi</b> <small style="color:#7A6652">(lee-KOO-mee)</small> = ten<br><br>You know 1–10 in Thimbukushu! 🎉<br>Try counting backwards: Likumi… Ipfumbamwe… Isere…`,
      `<div class="lang-tag">Thimbukushu · Numbers 11–20</div>Excellent! 🎉 Numbers 11–20:<br><br>In Thimbukushu, numbers above 10 combine <b>Likumi</b> (10) with the smaller number:<br><br><b>11</b> → <b>Likumi na Kamwe</b> = ten and one<br><b>12</b> → <b>Likumi na Mbali</b> = ten and two<br><b>15</b> → <b>Likumi na Itano</b> = ten and five<br><b>20</b> → <b>Makumi Mabali</b> <small style="color:#7A6652">(ma-KOO-mee ma-BAH-lee)</small> = twenty (two tens)<br><br>See the pattern? <b>Likumi</b> (10) + <b>na</b> (and) + the small number you already know!`,
      `<div class="lang-tag">Thimbukushu · Numbers 21–30</div>Almost there! 🌟 Numbers 21–30:<br><br><b>21</b> → <b>Makumi Mabali na Kamwe</b> = twenty one<br><b>22</b> → <b>Makumi Mabali na Mbali</b> = twenty two<br><b>25</b> → <b>Makumi Mabali na Itano</b> = twenty five<br><b>30</b> → <b>Makumi Matatu</b> <small style="color:#7A6652">(ma-KOO-mee ma-TAH-too)</small> = thirty<br><br>The pattern: <b>Makumi Mabali</b> (20) + <b>na</b> (and) + small number.<br>How old are you? Can you say your age in Thimbukushu? 🎉`

    english: [
      `<div class="lang-tag">English · Numbers 1–5</div>Let's learn to count in English! 🔢<br><br>Number → English word → how to say it:<br><br><b>1</b> → <b>One</b> <small style="color:#7A6652">(WUN)</small><br><b>2</b> → <b>Two</b> <small style="color:#7A6652">(TOO)</small><br><b>3</b> → <b>Three</b> <small style="color:#7A6652">(THREE)</small><br><b>4</b> → <b>Four</b> <small style="color:#7A6652">(FOR)</small><br><b>5</b> → <b>Five</b> <small style="color:#7A6652">(FIYVE)</small><br><br>Count with me: One… Two… Three… Four… Five…<br>How many fingers on one hand? Say it in English!`,
      `<div class="lang-tag">English · Numbers 6–10</div>Well done! 🌟 Keep counting:<br><br><b>6</b> → <b>Six</b> <small style="color:#7A6652">(SIKS)</small><br><b>7</b> → <b>Seven</b> <small style="color:#7A6652">(SEV-en)</small><br><b>8</b> → <b>Eight</b> <small style="color:#7A6652">(AYT — the GH is silent!)</small><br><b>9</b> → <b>Nine</b> <small style="color:#7A6652">(NIYN)</small><br><b>10</b> → <b>Ten</b> <small style="color:#7A6652">(TEN)</small><br><br>You know 1–10 in English! 🎉<br>How old are you? Write your age as a number, then say it!`,
      `<div class="lang-tag">English · Numbers 11–20</div>Excellent! 🎉 Numbers 11–20:<br><br><b>11</b> → <b>Eleven</b> <small style="color:#7A6652">(ee-LEV-en)</small><br><b>12</b> → <b>Twelve</b> <small style="color:#7A6652">(TWELV)</small><br><b>13</b> → <b>Thirteen</b> <small style="color:#7A6652">(thir-TEEN)</small><br><b>15</b> → <b>Fifteen</b> <small style="color:#7A6652">(fif-TEEN)</small><br><b>20</b> → <b>Twenty</b> <small style="color:#7A6652">(TWEN-tee)</small><br><br>Notice: 13–19 all end in <b>-teen</b>! That makes them easier to remember.<br>Thirteen, fourteen, fifteen, sixteen, seventeen, eighteen, nineteen!`,
      `<div class="lang-tag">English · Numbers 21–30</div>Almost there! 🌟 Numbers 21–30:<br><br><b>21</b> → <b>Twenty-one</b><br><b>22</b> → <b>Twenty-two</b><br><b>25</b> → <b>Twenty-five</b><br><b>30</b> → <b>Thirty</b> <small style="color:#7A6652">(THIR-tee)</small><br><br>Pattern: <b>Twenty</b> + the small number (one, two, three…)<br>Just like in Setswana! <b>Masome a mabedi le nngwe</b> = Twenty-one<br><br>How old are you? Can you say it in English AND in Setswana? 🎉`
    ]

  // ─── WORDS ───
  words: {
    setswana: [
      `<div class="lang-tag">Setswana · Words — Essentials</div>Mafoko a botlhokwa a Setswana! 💬<br><br>💧 <b>Metsi</b> = <b>water</b> <small style="color:#7A6652">(MET-see) — "Ke batla metsi" = I want water</small><br>🍽️ <b>Dijo</b> = <b>food</b> <small style="color:#7A6652">(DEE-jo)</small><br>🍲 <b>Bogobe</b> = <b>porridge</b> <small style="color:#7A6652">(bo-GOH-beh) — traditional Botswana food!</small><br>🏠 <b>Ntlo</b> = <b>house</b> <small style="color:#7A6652">(nn-TLO)</small><br>💰 <b>Pula</b> = <b>rain / money / cheers</b> <small style="color:#7A6652">(POO-la) — also the national motto!</small><br><br>Leka go bua lefoko lengwe lengwe. Which word do you use every day?`,
      `<div class="lang-tag">Setswana · Words — People & Places</div>Mafoko a batho le mafelo! 💬<br><br>👨‍👩‍👧 <b>Bana</b> = <b>children</b> <small style="color:#7A6652">(BAH-na)</small><br>🧑 <b>Motho</b> = <b>person</b> <small style="color:#7A6652">(MOH-tho)</small><br>👨 <b>Monna</b> = <b>man</b> <small style="color:#7A6652">(MON-na)</small><br>👩 <b>Mosadi</b> = <b>woman</b> <small style="color:#7A6652">(mo-SAH-dee)</small><br>🏙️ <b>Gaborone</b> = <b>capital city of Botswana</b> <small style="color:#7A6652">(ga-bo-ROH-neh)</small><br><br>Gaborone ke motse o mogolo wa Botswana — do you know someone who lives there?`,
      `<div class="lang-tag">Setswana · Words — Actions (from the PDF guide)</div>Mafoko a go dira! 💬<br><br>🗣️ <b>Bua</b> = <b>speak / talk</b> <small style="color:#7A6652">(BOO-ah) — "Ke bua Setswana" = I speak Setswana</small><br>📖 <b>Bala</b> = <b>read / count</b> <small style="color:#7A6652">(BAH-la) — "Ke bala buka" = I am reading a book</small><br>✍️ <b>Kwala</b> = <b>write</b> <small style="color:#7A6652">(KWA-la) — "Ke batla go kwala" = I want to write</small><br>🎓 <b>Ithuta</b> = <b>learn / study</b> <small style="color:#7A6652">(ee-THOO-ta) — "Re ithuta Setswana" = We are learning Setswana</small><br>🚶 <b>Tsamaya</b> = <b>go / travel / walk</b> <small style="color:#7A6652">(tsa-MAH-ya)</small><br><br>Right now you are doing <b>Bala</b> AND <b>Ithuta</b>! Well done!`,
      `<div class="lang-tag">Setswana · Words — Greetings vocabulary</div>Mafoko a go dumedisa! 💬<br><br>👋 <b>Dumela</b> = <b>Hello</b> <small style="color:#7A6652">(to one person)</small><br>👋 <b>Dumelang</b> = <b>Hello everyone</b> <small style="color:#7A6652">(to a group)</small><br>❓ <b>O tsogile jang?</b> = <b>How did you wake up? / How are you?</b> <small style="color:#7A6652">(formal morning greeting)</small><br>✅ <b>Ke tsogile sentle</b> = <b>I woke up well / I am fine</b> <small style="color:#7A6652">(keh tso-GEE-leh SEN-tleh)</small><br>👋 <b>Sala sentle</b> = <b>Stay well (goodbye — to one staying)</b><br>🚶 <b>Tsamaya sentle</b> = <b>Go well (goodbye — to one leaving)</b><br><br>These greetings are used every single day in Botswana! 🇧🇼`,
      `<div class="lang-tag">Setswana · Words — Useful phrases</div>Mafoko a go dirisiwa! 💬<br><br>🙏 <b>Ke a leboga</b> = <b>Thank you</b> <small style="color:#7A6652">(keh ah leh-BOH-ga) — formal</small><br>🙏 <b>Ke itumetse</b> = <b>I am grateful / thank you</b> <small style="color:#7A6652">(keh ee-too-MET-seh) — common form</small><br>🙏 <b>Tanki</b> = <b>Thank you</b> <small style="color:#7A6652">(TAN-kee) — casual, from English "thanks"</small><br>❓ <b>O kae?</b> = <b>Where are you?</b> <small style="color:#7A6652">(oh KAH-eh) — also means "how are you?" informally</small><br>✅ <b>Ke teng</b> = <b>I am here / I am fine</b> <small style="color:#7A6652">(keh TENG)</small><br><br>All three "thank you" words are real and common. Which one do YOU prefer?`,
      `<div class="lang-tag">Setswana · Words — Wanting & Knowing</div>Go batla le go itse! 💬<br><br>💡 <b>Ke batla</b> = <b>I want / I am looking for</b> <small style="color:#7A6652">(keh BAT-la) — "Ke batla go bua" = I want to speak</small><br>📚 <b>Ke itse</b> = <b>I know</b> <small style="color:#7A6652">(keh EE-tseh) — "Ke itse Setswana" = I know Setswana</small><br>❓ <b>Ga ke itse</b> = <b>I don't know</b> <small style="color:#7A6652">(ga keh EE-tseh) — honest and useful!</small><br>🙋 <b>Ke kopa</b> = <b>I request / please</b> <small style="color:#7A6652">(keh KOH-pa) — polite way to ask for something</small><br><br>Try this sentence from the PDF guide:<br><b>"Ke batla go ithuta Setswana."</b> = I want to learn Setswana. 🎓`
    ],
    kalanga: [
      `<div class="lang-tag">TjiKalanga · Words — Nature</div>TjiKalanga words from nature! 💬<br><br>💧 <b>Vula</b> = <b>water / rain</b> <small style="color:#7A6652">(VOO-la)</small><br>🔥 <b>Moto</b> = <b>fire / heat</b> <small style="color:#7A6652">(MOH-to)</small><br>⛰️ <b>Dombo</b> = <b>mountain / hill</b> <small style="color:#7A6652">(DOM-bo)</small><br>🌳 <b>Ti</b> = <b>tree / trees</b> <small style="color:#7A6652">(tee)</small><br>🦁 <b>Simba</b> = <b>lion</b> <small style="color:#7A6652">(SIM-ba) — also means strength!</small><br>🐊 <b>Ngwena</b> = <b>crocodile</b> <small style="color:#7A6652">(ng-WEH-na)</small><br><br>Say each word and picture it in your mind. Which animal would you NOT want to meet?`,
      `<div class="lang-tag">TjiKalanga · Words — Family</div>TjiKalanga family words! 💬<br><br>👵 <b>Kuku</b> = <b>grandmother</b> <small style="color:#7A6652">(KOO-koo)</small><br>👨‍👩‍👧 <b>Bana</b> = <b>children</b> <small style="color:#7A6652">(BAH-na)</small><br>👶 <b>Ng'wanana</b> = <b>girl / female child</b> <small style="color:#7A6652">(ng-wa-NAH-na)</small><br>👦 <b>Isana</b> = <b>small boy</b> <small style="color:#7A6652">(ee-SAH-na)</small><br>👨 <b>Lume</b> = <b>man</b> <small style="color:#7A6652">(LOO-meh)</small><br>👩 <b>Kadzi</b> = <b>woman / wife</b> <small style="color:#7A6652">(KAH-dzee)</small><br><br>Say your family role in TjiKalanga — are you a <b>Lume</b> or a <b>Kadzi</b>?`,
      `<div class="lang-tag">TjiKalanga · Words — Food &amp; Home</div>TjiKalanga food and home words! 💬<br><br>🍽️ <b>Ndilo</b> = <b>dish / plate</b> <small style="color:#7A6652">(nn-DEE-lo)</small><br>🫕 <b>Hali</b> = <b>cooking pot</b> <small style="color:#7A6652">(HAH-lee)</small><br>🥩 <b>Nyama</b> = <b>meat</b> <small style="color:#7A6652">(NYA-ma)</small><br>🌽 <b>Manga</b> = <b>maize / corn</b> <small style="color:#7A6652">(MAN-ga)</small><br>🏠 <b>Ng'umba</b> = <b>house / hut</b> <small style="color:#7A6652">(ng-OOM-ba)</small><br>🪵 <b>Huni</b> = <b>firewood</b> <small style="color:#7A6652">(HOO-nee)</small><br><br>Which of these things can you see in your home right now?`,
      `<div class="lang-tag">TjiKalanga · Words — Body</div>TjiKalanga body words! 💬<br><br>👀 <b>Zhisho</b> = <b>eye</b> <small style="color:#7A6652">(ZHEE-sho)</small><br>👂 <b>Zebe</b> = <b>ear</b> <small style="color:#7A6652">(ZEH-beh)</small><br>👄 <b>Lomo</b> = <b>mouth / beak</b> <small style="color:#7A6652">(LOH-mo)</small><br>🦷 <b>Zhino</b> = <b>tooth</b> <small style="color:#7A6652">(ZHEE-no)</small><br>🦵 <b>Gumbo</b> = <b>leg / foot / wheel</b> <small style="color:#7A6652">(GOOM-bo)</small><br>💪 <b>Simba</b> = <b>strength / power</b> <small style="color:#7A6652">(SIM-ba)</small><br><br>Touch your <b>Zebe</b> (ear)! Now touch your <b>Zhisho</b> (eye)! Fun way to remember!`,
      `<div class="lang-tag">TjiKalanga · Words — Actions (Verbs)</div>TjiKalanga action words! 💬<br><br>✍️ <b>Kwala</b> = <b>to write</b> <small style="color:#7A6652">(KWA-la)</small><br>📖 <b>Bala</b> = <b>to read / to count</b> <small style="color:#7A6652">(BAH-la)</small><br>🚶 <b>Enda</b> = <b>to go / go away</b> <small style="color:#7A6652">(EN-da)</small><br>😴 <b>Lala</b> = <b>to sleep / spend the night</b> <small style="color:#7A6652">(LAH-la)</small><br>🍽️ <b>Ja</b> = <b>to eat</b> <small style="color:#7A6652">(jah)</small><br>💬 <b>Leba</b> = <b>to talk / to speak</b> <small style="color:#7A6652">(LEH-ba)</small><br><br>Right now you are doing <b>Bala</b> (reading)! Well done!`,
      `<div class="lang-tag">TjiKalanga · Words — Feelings &amp; Values</div>TjiKalanga feeling words! 💬<br><br>❤️ <b>Da</b> = <b>to love / to like</b> <small style="color:#7A6652">(dah)</small><br>😊 <b>Shatho</b> = <b>happiness</b> <small style="color:#7A6652">(SHA-tho)</small><br>🙏 <b>Tenda</b> = <b>to thank / show gratitude</b> <small style="color:#7A6652">(TEN-da)</small><br>🤝 <b>Thusa</b> = <b>to help / assist</b> <small style="color:#7A6652">(THOO-sa)</small><br>📚 <b>Diya</b> = <b>to teach / to preach</b> <small style="color:#7A6652">(DEE-ya)</small><br>💪 <b>Kunda</b> = <b>to defeat / succeed</b> <small style="color:#7A6652">(KOON-da)</small><br><br>You are showing <b>Shatho</b> (happiness) by learning today! Keep going! 🌟`
    ],
    kgalagadi: [
      `<div class="lang-tag">Shekgalagari · Words — Essentials</div>Essential Shekgalagari words! 💬<br><br>Shekgalagari word → English meaning → Setswana equivalent:<br><br>💧 <b>Maze</b> = <b>water</b> <small style="color:#7A6652">(MAH-zeh) — Setswana: metsi</small><br>☀️ <b>Leatjsi</b> = <b>sun / day</b> <small style="color:#7A6652">(leh-AT-see) — Setswana: letsatsi</small><br>🏠 <b>Itu</b> = <b>house</b> <small style="color:#7A6652">(EE-too) — Setswana: ntlo</small><br>🏫 <b>Shekole</b> = <b>school</b> <small style="color:#7A6652">(sheh-KOH-leh) — Setswana: sekolo</small><br>🐄 <b>Rimho / Rikgomo</b> = <b>cattle / cows</b> <small style="color:#7A6652">(REE-mo) — Setswana: dikgomo</small><br><br>Say each word out loud. Which one is easiest to remember?`,
      `<div class="lang-tag">Shekgalagari · Words — People</div>Shekgalagari people words! 💬<br><br>👦 <b>Mantjsana</b> = <b>boy</b> <small style="color:#7A6652">(man-TCHA-na) — Setswana: mosimane</small><br>👧 <b>Mosezana</b> = <b>girl</b> <small style="color:#7A6652">(mo-seh-ZAH-na) — Setswana: mosetsana</small><br>🧑 <b>Moqho</b> = <b>person</b> <small style="color:#7A6652">(MO-qo) — Setswana: motho</small><br>👶 <b>Motjhwana</b> = <b>child / kid</b> <small style="color:#7A6652">(mo-TCHWAH-na) — Setswana: ngwana</small><br>👫 <b>Kgalariyame</b> = <b>my brother / sister</b> <small style="color:#7A6652">(ka-la-REE-ya-meh) — Setswana: kgaitsadiake</small><br><br>Which word describes YOU or someone in your family?`,
      `<div class="lang-tag">Shekgalagari · Words — Actions</div>Shekgalagari action words! 💬<br><br>⬇️ <b>Nto / Dah gkanno</b> = <b>come!</b> <small style="color:#7A6652">(nn-TOH / da-KAH-no) — Setswana: tla</small><br>🪑 <b>Rula</b> = <b>sit down</b> <small style="color:#7A6652">(ROO-la) — Setswana: nna</small><br>🧍 <b>Metshe</b> = <b>stand up</b> <small style="color:#7A6652">(MET-sheh) — Setswana: ema</small><br>👂 <b>Uzwa</b> = <b>hear / listen</b> <small style="color:#7A6652">(OO-zwa) — Setswana: utlwa</small><br>🗣️ <b>Bola / Logka</b> = <b>talk / speak</b> <small style="color:#7A6652">(BOH-la / LOG-ka) — Setswana: bua</small><br><br>Try: say <b>Rula!</b> (sit down!) to someone near you!`,
      `<div class="lang-tag">Shekgalagari · Words — Everyday Life</div>More Shekgalagari daily words! 💬<br><br>🥛 <b>Moriso</b> = <b>milk</b> <small style="color:#7A6652">(mo-REE-so) — Setswana: mashi</small><br>🙏 <b>Morimo</b> = <b>God</b> <small style="color:#7A6652">(mo-REE-mo) — Setswana: modimo</small><br>🆘 <b>Ntjhusa / Ntjhwisa</b> = <b>help me!</b> <small style="color:#7A6652">(nn-TCHOO-sa) — Setswana: nthusa</small><br>🍳 <b>Relaa / Relega</b> = <b>to cook</b> <small style="color:#7A6652">(reh-LAH) — Setswana: apaya</small><br>❓ <b>Hakeze</b> = <b>I don't know</b> <small style="color:#7A6652">(hah-KEH-zeh) — Setswana: gakeitse</small><br><br>Very useful: <b>"Hakeze"</b> = I don't know! A brave and honest thing to say while learning!`,
      `<div class="lang-tag">Shekgalagari · Words — Feelings</div>Shekgalagari feeling words! 💬<br><br>😴 <b>Daleja nda ka lapa</b> = <b>I am tired</b> <small style="color:#7A6652">(dah-LEH-ja nda ka LAH-pa) — Setswana: Ke lapile</small><br>👂 <b>Uzwa</b> = <b>hear / understand</b> <small style="color:#7A6652">(OO-zwa) — to listen and understand</small><br>🗣️ <b>Bola</b> = <b>talk / speak</b> <small style="color:#7A6652">(BOH-la) — to express yourself</small><br>🙏 <b>Ntjhusa</b> = <b>help me</b> <small style="color:#7A6652">(nn-TCHOO-sa) — asking for help is brave!</small><br><br>When you are tired: <b>Daleja nda ka lapa</b> — "I am tired."<br>That is a real Shekgalagari sentence you can use today! 🌟`
    ],
    mbukushu: [
      `<div class="lang-tag">Thimbukushu · Words — People</div>Thimbukushu people words! 💬<br><br>All verified from the dictionary:<br><br>🧑 <b>Ame</b> = <b>I / me</b> <small style="color:#7A6652">(AH-meh)</small><br>👤 <b>Owe</b> = <b>you</b> <small style="color:#7A6652">(OH-weh)</small><br>👥 <b>Aye</b> = <b>he / she</b> <small style="color:#7A6652">(AH-yeh)</small><br>👨‍👩‍👧 <b>Hanu</b> = <b>people</b> <small style="color:#7A6652">(HAH-noo)</small><br>🤝 <b>Mushere</b> = <b>friend</b> <small style="color:#7A6652">(moo-SHEH-reh)</small><br><br>Example: <b>"Ame na haka kutoya"</b> = I like reading.<br>Try making a sentence using <b>Ame</b> (I)!`,
      `<div class="lang-tag">Thimbukushu · Words — Nature & Time</div>Thimbukushu nature and time words! 💬<br><br>☀️ <b>Diyuwa</b> = <b>sun</b> <small style="color:#7A6652">(dee-YOO-wa)</small><br>📅 <b>Dyaro</b> = <b>today</b> <small style="color:#7A6652">(DYA-ro) — "Dyaro ne mepo" = Today it's cold</small><br>🌿 <b>Yidya</b> = <b>food</b> <small style="color:#7A6652">(YEE-dya) — "Ghahaka yidya" = He/she likes food</small><br>🦟 <b>Kamwe</b> = <b>mosquito</b> <small style="color:#7A6652">(KAM-weh) — "Kamwe ka ni humu" = I was bitten by a mosquito</small><br><br>Which of these words connects to something in YOUR day today?`,
      `<div class="lang-tag">Thimbukushu · Words — Actions</div>Thimbukushu action words! 💬<br><br>🚶 <b>Kuyenda</b> = <b>to walk</b> <small style="color:#7A6652">(koo-YEN-da) — "Ame kuna kuyenda" = I am walking</small><br>🏃 <b>Tjire</b> = <b>run!</b> <small style="color:#7A6652">(TJEE-reh) — a command: run!</small><br>🏠 <b>Wiye</b> = <b>come!</b> <small style="color:#7A6652">(WEE-yeh) — "Wiye kudimbo" = Come home</small><br>📖 <b>Kutoya</b> = <b>reading</b> <small style="color:#7A6652">(koo-TOY-a) — "Ame na haka kutoya" = I like reading</small><br>🗣️ <b>Kuhonga</b> = <b>to teach</b> <small style="color:#7A6652">(koo-HON-ga) — "Aye kuna kuhonga" = He/she is teaching</small><br><br>You are doing <b>Kutoya</b> right now! Reading is powerful! 📖`,
      `<div class="lang-tag">Thimbukushu · Words — Feelings & Values</div>Thimbukushu feeling words! 💬<br><br>☮️ <b>Thiraro</b> = <b>peace</b> <small style="color:#7A6652">(thee-RAH-ro) — "Thiraro ne tha reta makukwatathano" = Peace brings collaboration</small><br>😴 <b>Ghuva</b> = <b>lazy</b> <small style="color:#7A6652">(GHOO-va) — "Mbadi kukaranga ghuva" = Don't be lazy!</small><br>💡 <b>Dimuka</b> = <b>to know / understand</b> <small style="color:#7A6652">(dee-MOO-ka) — "Owe wa dimuka" = You know</small><br>🗣️ <b>Kughamba</b> = <b>to speak</b> <small style="color:#7A6652">(koo-GHAM-ba) — "Ame kughamba Thimbukushu" = I speak Thimbukushu</small><br><br>You are NOT <b>Ghuva</b> (lazy) — you are here learning! Well done! 🌟`

    english: [
      `<div class="lang-tag">English · Words — Everyday Essentials</div>Important English words you need every day! 💬<br><br>English word = meaning + used where:<br><br>💧 <b>Water</b> = liquid you drink <small style="color:#7A6652">(Setswana: metsi) — "I want water"</small><br>🍽️ <b>Food</b> = what you eat <small style="color:#7A6652">(Setswana: dijo) — "I need food"</small><br>🏠 <b>House</b> = where you live <small style="color:#7A6652">(Setswana: ntlo)</small><br>🏫 <b>School</b> = where children learn <small style="color:#7A6652">(Setswana: sekolo)</small><br>💰 <b>Money</b> = what you use to buy things <small style="color:#7A6652">(Setswana: madi / pula)</small><br><br>Say each word out loud. Which word do you use most every day?`,
      `<div class="lang-tag">English · Words — People & Community</div>English words for people around you! 💬<br><br>👨‍👩‍👧 <b>Family</b> = your relatives <small style="color:#7A6652">(Setswana: lelapa)</small><br>🤝 <b>Friend</b> = someone you like and trust <small style="color:#7A6652">(Setswana: tsala)</small><br>👨‍⚕️ <b>Doctor</b> = medical person who helps you <small style="color:#7A6652">(Setswana: ngaka)</small><br>👩‍🏫 <b>Teacher</b> = person who teaches <small style="color:#7A6652">(Setswana: morutabana)</small><br>👮 <b>Police</b> = law officers who keep peace <small style="color:#7A6652">(Setswana: mapodisi)</small><br><br>Which person do you interact with most in your daily life?`,
      `<div class="lang-tag">English · Words — Actions (Verbs)</div>English action words you must know! 💬<br><br>📖 <b>Read</b> = to look at and understand writing <small style="color:#7A6652">(Setswana: bala) — "I read" / "I am reading"</small><br>✍️ <b>Write</b> = to make letters on paper <small style="color:#7A6652">(Setswana: kwala)</small><br>🗣️ <b>Speak / Talk</b> = to use your voice <small style="color:#7A6652">(Setswana: bua)</small><br>🎓 <b>Learn</b> = to get new knowledge <small style="color:#7A6652">(Setswana: ithuta)</small><br>🏃 <b>Work</b> = to do a job <small style="color:#7A6652">(Setswana: bereka)</small><br><br>Right now you are doing all of these — reading, learning and writing! 🌟`,
      `<div class="lang-tag">English · Words — Places</div>English words for important places! 💬<br><br>🏥 <b>Hospital / Clinic</b> = where sick people go <small style="color:#7A6652">(Setswana: sepetlele)</small><br>🏬 <b>Shop / Store</b> = where you buy things <small style="color:#7A6652">(Setswana: lebenkele)</small><br>🏦 <b>Bank</b> = where you keep money <small style="color:#7A6652">(Setswana: banka)</small><br>🚌 <b>Bus stop</b> = where the bus picks you up <small style="color:#7A6652">(Setswana: moo bese e emang teng)</small><br>💼 <b>Office</b> = place of work <small style="color:#7A6652">(Setswana: ofisi)</small><br><br>You will see these words written on signs everywhere in Botswana. Now you can read them! 🎉`,
      `<div class="lang-tag">English · Words — Numbers & Documents</div>English words for official things! 💬<br><br>📄 <b>Form</b> = a document you fill in <small style="color:#7A6652">(Setswana: fomo)</small><br>✍️ <b>Sign</b> = to write your name on a document <small style="color:#7A6652">(Setswana: saina)</small><br>🧾 <b>Receipt</b> = proof that you paid <small style="color:#7A6652">(Setswana: risiti)</small><br>🆔 <b>Identity / ID</b> = your identification card <small style="color:#7A6652">(Setswana: karata ya boitshupo)</small><br>📞 <b>Number</b> = a figure, e.g. phone number <small style="color:#7A6652">(Setswana: nomoro)</small><br><br>These words appear on every form, receipt and ID in Botswana. Knowing them helps you in every office!`,
      `<div class="lang-tag">English · Words — Feelings & Communication</div>English words for feelings! 💬<br><br>😊 <b>Happy</b> = feeling good and joyful <small style="color:#7A6652">(Setswana: go itumela)</small><br>😔 <b>Tired</b> = needing rest <small style="color:#7A6652">(Setswana: lapile)</small><br>🙏 <b>Thank you</b> = showing gratitude <small style="color:#7A6652">(Setswana: ke a leboga)</small><br>❓ <b>Please</b> = asking politely <small style="color:#7A6652">(Setswana: ke kopa)</small><br>✅ <b>Yes</b> = agreeing <small style="color:#7A6652">(Setswana: ee)</small><br>❌ <b>No</b> = refusing or disagreeing <small style="color:#7A6652">(Setswana: nyaa)</small><br><br>"Thank you", "Please", "Yes", "No" — four words that will take you far in any English conversation! 🌟`
